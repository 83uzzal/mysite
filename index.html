<style>
:root{
    --gold:#ffd500;
    --glass-bg:rgba(255,255,255,.05);
    --glass-border:rgba(255,255,255,.1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    background:#000;
    color:#fff;
    height:100vh;
    width:100vw;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.video-bg{
    position:fixed;
    top:50%;
    left:50%;
    min-width:100%;
    min-height:100%;
    transform:translate(-50%,-50%);
    object-fit:cover;
    filter:brightness(.3) contrast(1.2);
    z-index:-1;
}

.main-wrapper{
    display:grid;
    grid-template-columns:160px 1fr 160px;
    gap:30px;
    width:94%;
    max-width:1440px;
    align-items:center;
}

.adsense-side-wrapper {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.side-ad-box {
    width: 160px;
    height: 280px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    border: 1px solid var(--glass-border);
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
    position: relative;
    animation: float 4s ease-in-out infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

.side-ad-box::before {
    content: '';
    position: absolute;
    width: 150%;
    height: 150%;
    background-image: conic-gradient(transparent, transparent, transparent, var(--gold));
    animation: rotateLine 4s linear infinite;
    z-index: 1;
}

.side-ad-box::after {
    content: '';
    position: absolute;
    inset: 3px; 
    background: #000;
    border-radius: 10px;
    z-index: 2;
}

@keyframes rotateLine {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

.side-ad-box:nth-child(2) { animation-delay: 2s; }

.side-ad-box:hover {
    box-shadow: 0 0 25px rgba(255, 213, 0, 0.4);
    animation-play-state: paused;
}

.side-ad-box .ad-trigger {
    display: block;
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 3;
}

.side-ad-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
}

.side-ad-box:hover .side-ad-img { transform: scale(1.1); }

.glass-portal{
    background:var(--glass-bg);
    backdrop-filter:blur(30px) saturate(160%);
    border:1px solid var(--glass-border);
    border-radius:40px;
    padding:50px 60px;
    display:grid;
    grid-template-columns:1.2fr .8fr;
    gap:50px;
    box-shadow:0 40px 100px rgba(0,0,0,.9);
    position:relative;
    transform:scale(.9);
}

.brand-side h1{
    font-size:4.2rem;
    font-weight:900;
    line-height:.85;
    letter-spacing:-2px;
    margin-bottom:25px;
}

.brand-side p{
    font-size:1.1rem;
    color:rgba(255,255,255,.5);
    margin-bottom:35px;
}

.system-status{
    font-size:12px;
    font-weight:900;
    color:var(--gold);
    display:flex;
    align-items:center;
    gap:10px;
}

.system-status::before{
    content:'';
    width:10px;
    height:10px;
    background:var(--gold);
    border-radius:50%;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);opacity:1}
    50%{transform:scale(1.4);opacity:.5}
    100%{transform:scale(1);opacity:1}
}

.nav-stack{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.nav-item{
    padding:20px 25px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    text-decoration:none;
    color:#fff;
    font-weight:700;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:.4s ease;
}

.nav-item:hover{
    background:var(--gold);
    color:#000;
    transform:translateX(10px);
}

.locker-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.95);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(8px);
}

@keyframes soft-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.animate-soft-pulse { animation: soft-pulse 2s infinite; }

.ad-tag-bottom{
    position:absolute;
    bottom:-75px;
    left:50%;
    transform:translateX(-50%);
    width:728px;
    height:90px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.7);
    border: 1px solid rgba(255, 213, 0, 0.2);
    animation: bottomMove 4s ease-in-out infinite;
    transition: all 0.3s ease;
}

.ad-tag-bottom:hover {
    box-shadow: 0 0 25px rgba(255, 213, 0, 0.4);
    border-color: var(--gold);
    animation-play-state: paused;
}

@keyframes bottomMove {
    0%, 100% { transform: translateX(-50%) translateY(0px); }
    50% { transform: translateX(-50%) translateY(-10px); }
}

@media(max-width:1250px){
    .main-wrapper{grid-template-columns:1fr}
    .adsense-side-wrapper, .ad-tag-bottom{display:none}
    .glass-portal{
        grid-template-columns:1fr;
        transform:scale(1);
        padding:40px 30px;
    }
}

.nav-item, .system-status { letter-spacing: 2px; }

</style>
</head>
