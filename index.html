<style>
:root{
    --gold:#ffd500;
    --glass-bg:rgba(255,255,255,.05);
    --glass-border:rgba(255,255,255,.1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    background:#000;
    color:#fff;
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden; /* Prevent horizontal scroll */
}

.video-bg{
    position:fixed;
    top:50%;
    left:50%;
    min-width:100%;
    min-height:100%;
    transform:translate(-50%,-50%);
    object-fit:cover;
    filter:brightness(.3) contrast(1.2);
    z-index:-1;
}

/* MAIN LAYOUT */
.main-wrapper {
    display: grid;
    grid-template-columns: 160px 1fr 160px;
    gap: 30px;
    width: 94%;
    max-width: 1440px;
    align-items: center;
    padding: 20px 0;
}

.adsense-side-wrapper {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* CARDS / BANNERS */
.side-ad-box {
    width: 160px;
    height: 280px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    border: 1px solid var(--glass-border);
    position: relative;
    animation: float 4s ease-in-out infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

.side-ad-box::before {
    content: '';
    position: absolute;
    width: 150%;
    height: 150%;
    background-image: conic-gradient(transparent, transparent, transparent, var(--gold));
    animation: rotateLine 4s linear infinite;
    z-index: 1;
}

.side-ad-box::after {
    content: '';
    position: absolute;
    inset: 3px; 
    background: #000;
    border-radius: 10px;
    z-index: 2;
}

@keyframes rotateLine { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }

.side-ad-box:nth-child(2) { animation-delay: 2s; }

.side-ad-box .ad-trigger {
    display: block;
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 3;
}

.side-ad-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* CENTRAL PORTAL */
.glass-portal{
    background:var(--glass-bg);
    backdrop-filter:blur(30px) saturate(160%);
    border:1px solid var(--glass-border);
    border-radius:40px;
    padding:50px 60px;
    display:grid;
    grid-template-columns:1.2fr .8fr;
    gap:50px;
    box-shadow:0 40px 100px rgba(0,0,0,.9);
    position:relative;
}

.brand-side h1{
    font-size: clamp(2.5rem, 5vw, 4.2rem);
    font-weight:900;
    line-height:.85;
    letter-spacing:-2px;
    margin-bottom:25px;
}

.brand-side p{
    font-size:1.1rem;
    color:rgba(255,255,255,.5);
    margin-bottom:35px;
}

.system-status{
    font-size:12px;
    font-weight:900;
    color:var(--gold);
    display:flex;
    align-items:center;
    gap:10px;
    letter-spacing: 2px;
}

.system-status::before{
    content:'';
    width:10px;
    height:10px;
    background:var(--gold);
    border-radius:50%;
    animation:pulse 2s infinite;
}

@keyframes pulse{ 0%, 100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.5} }

/* NAVIGATION */
.nav-stack{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.nav-item{
    padding:20px 25px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    text-decoration:none;
    color:#fff;
    font-weight:700;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:.4s ease;
    letter-spacing: 2px;
}

.nav-item:hover{
    background:var(--gold);
    color:#000;
    transform:translateX(10px);
}

/* BOTTOM AD */
.ad-tag-bottom{
    position:absolute;
    bottom:-75px;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width: 728px;
    height:90px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.7);
    border: 1px solid rgba(255, 213, 0, 0.2);
    animation: bottomMove 4s ease-in-out infinite;
}

@keyframes bottomMove { 0%, 100% { transform: translateX(-50%) translateY(0px); } 50% { transform: translateX(-50%) translateY(-10px); } }

/* MOBILE RESPONSIVENESS */
@media(max-width:1250px){
    body {
        overflow-y: auto;
        padding: 40px 0;
    }
    .main-wrapper{
        grid-template-columns:1fr;
        width: 90%;
    }
    .adsense-side-wrapper {
        display: grid;
        grid-template-columns: 1fr 1fr; /* Show side-by-side on tablet/large mobile */
        justify-items: center;
    }
    .side-ad-box {
        width: 100%;
        max-width: 160px;
    }
    .glass-portal{
        grid-template-columns:1fr;
        padding:40px 25px;
        gap: 30px;
    }
    .brand-side {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .brand-side br { display: none; }
    .ad-tag-bottom {
        position: relative;
        bottom: 0;
        left: 0;
        transform: none;
        margin-top: 30px;
        animation: none;
    }
    @keyframes bottomMove { none; }
}

@media(max-width: 600px){
    .adsense-side-wrapper {
        grid-template-columns: 1fr; /* Stack banners on small phones */
    }
    .brand-side h1 {
        font-size: 3rem;
    }
    .nav-item {
        padding: 15px;
        font-size: 0.9rem;
    }
}
</style>
</head>
