<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serial Tracked Data Copier & Profile Generator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f0f2f5;
            padding: 15px;
            color: #333;
        }
        /* মূল ড্যাশবোর্ড লেআউট থ্রি-কলাম বা রেসপন্সিভ ফ্লেক্স */
        .dashboard-wrapper {
            display: flex;
            gap: 15px;
            max-width: 100%;
            margin: 0 auto;
        }
        /* প্রতিটি কন্টেইনারের কমন স্টাইল */
        .container {
            flex: 1;
            min-width: 0;
            background: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            align-self: flex-start;
            border: 1px solid #e1e4e8;
        }
        /* কার্ড ৩ (প্রোফাইল জেনারেটর) এর জন্য ফিক্সড উইডথ বা ফ্লেক্স কন্ট্রোল */
        .generator-card {
            max-width: 350px;
        }
        h2 {
            color: #2c3e50;
            padding-bottom: 5px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            word-wrap: break-word;
        }
        /* ইনপুট ও সার্চ বক্স স্টাইল */
        .search-box, .input-field {
            width: 100%;
            padding: 6px 10px;
            margin-top: 8px;
            margin-bottom: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
            transition: all 0.2s;
        }
        .search-box:focus, .input-field:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        /* টেবিল স্ক্রল করার সুবিধা */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            max-height: 70vh;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }
        th, td {
            padding: 6px 8px;
            text-align: left;
            border-bottom: 1px solid #eef2f5;
            font-size: 12px;
        }
        th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid #cbd5e1;
        }
        /* বাটন স্টাইলস */
        .btn-copy {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 3px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10.5px;
            margin-right: 2px;
            font-weight: 500;
            transition: background 0.15s;
        }
        .btn-copy:hover { background-color: #2980b9; }
        .btn-copy:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            text-decoration: line-through;
            border: 1px dashed #cbd5e1;
        }
        .btn-reset {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
        .btn-reset:hover { background-color: #d35400; }
        
        /* জেনারেটর কার্ডের বাটন */
        .btn-gen {
            width: 100%;
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 7px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-gen:hover { background-color: #4338ca; }
        
        .btn-copy-zip {
            width: 100%;
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        /* রেজাল্ট এরিয়া */
        #zipResult {
            margin-top: 10px;
            font-size: 12px;
            padding: 8px;
            background: #f8fafc;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
            line-height: 1.5;
        }
        .label { font-weight: bold; color: #475569; }
        
        /* ব্যাজ ও অন্যান্য */
        .status-badge {
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
        }
        .status-unused { background-color: #d1fae5; color: #065f46; }
        .status-used { background-color: #fee2e2; color: #991b1b; }
        tr.used-row { background-color: #f8fafc; opacity: 0.85; }
        tr:hover { background-color: #f1f5f9; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            gap: 10px;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 5px;
        }

        /* রেসপন্সিভ ব্রেকপয়েন্ট */
        @media (max-width: 1200px) {
            .dashboard-wrapper {
                flex-direction: column;
            }
            .generator-card {
                max-width: 100%;
            }
        }
    </style>
</head>

    <div class="container">

    // --- বাম পাশের টেবিল রেন্ডার ---
    function renderMainTable() {
        const tableBody = document.getElementById('dataTableBody');
        tableBody.innerHTML = '';

        mainData.forEach((item, index) => {
            const sl = index + 1;
            const fnKey = `main_fn_${index}`;
            const lnKey = `main_ln_${index}`;
            const emailKey = `main_email_${index}`;

            const isFnCopied = mainTracker[fnKey] || false;
            const isLnCopied = mainTracker[lnKey] || false;
            const isEmailCopied = mainTracker[emailKey] || false;
            const isRowUsed = isFnCopied || isLnCopied || isEmailCopied;

            const tr = document.createElement('tr');
            if (isRowUsed) tr.classList.add('used-row');

            tr.innerHTML = `
                <td><strong>${sl}</strong></td>
                <td>${item.firstName}</td>
                <td>${item.lastName}</td>
                <td>${item.email}</td>
                <td><span class="status-badge ${isRowUsed ? 'status-used' : 'status-unused'}">${isRowUsed ? 'Used' : 'Unused'}</span></td>
                <td class="actions-cell">
                    <button class="btn-copy" ${isFnCopied ? 'disabled' : ''} onclick="copyText('${item.firstName.replace(/'/g, "\\'")}', '${fnKey}', 'main')">FN</button>
                    <button class="btn-copy" ${isLnCopied ? 'disabled' : ''} onclick="copyText('${item.lastName.replace(/'/g, "\\'")}', '${lnKey}', 'main')">LN</button>
                    <button class="btn-copy" ${isEmailCopied ? 'disabled' : ''} onclick="copyText('${item.email}', '${emailKey}', 'main')">Email</button>
                </td>
            `;
            tableBody.appendChild(tr);
        });
    }

    // --- ডান পাশের টেবিল রেন্ডার ---
    function renderMobileTable(filterText = '') {
        const tableBody = document.getElementById('mobileTableBody');
        tableBody.innerHTML = '';

        mobileData.forEach((item, index) => {
            if (filterText && !item.location.toLowerCase().includes(filterText.toLowerCase())) return;

            const sl = index + 1;
            const locKey = `mob_loc_${index}`;
            const addKey = `mob_add_${index}`;
            const phoneKey = `mob_phone_${index}`;

            const isLocCopied = mobileTracker[locKey] || false;
            const isAddCopied = mobileTracker[addKey] || false;
            const isPhoneCopied = mobileTracker[phoneKey] || false;
            const isRowUsed = isLocCopied || isAddCopied || isPhoneCopied;

            const tr = document.createElement('tr');
            if (isRowUsed) tr.classList.add('used-row');

            tr.innerHTML = `
                <td><strong>${sl}</strong></td>
                <td>${item.location}</td>
                <td>${item.address}</td>
                <td>${item.phone}</td>
                <td><span class="status-badge ${isRowUsed ? 'status-used' : 'status-unused'}">${isRowUsed ? 'Used' : 'Unused'}</span></td>
                <td class="actions-cell">
                    <button class="btn-copy" ${isLocCopied ? 'disabled' : ''} onclick="copyText('${item.location.replace(/'/g, "\\'")}', '${locKey}', 'mobile')">Loc</button>
                    <button class="btn-copy" ${isAddCopied ? 'disabled' : ''} onclick="copyText('${item.address.replace(/'/g, "\\'")}', '${addKey}', 'mobile')">Addr</button>
                    <button class="btn-copy" ${isPhoneCopied ? 'disabled' : ''} onclick="copyText('${item.phone}', '${phoneKey}', 'mobile')">Phone</button>
                </td>
            `;
            tableBody.appendChild(tr);
        });
    }

    function filterMobileTable() {
        const query = document.getElementById('zipSearchInput').value;
        renderMobileTable(query);
    }

    function copyText(text, key, type) {
        navigator.clipboard.writeText(text).then(() => {
            if (type === 'main') {
                mainTracker[key] = true;
                localStorage.setItem('mainClickTracker', JSON.stringify(mainTracker));
                renderMainTable();
            } else {
                mobileTracker[key] = true;
                localStorage.setItem('mobileClickTracker', JSON.stringify(mobileTracker));
                const currentQuery = document.getElementById('zipSearchInput').value;
                renderMobileTable(currentQuery);
            }
        }).catch(err => console.error('Failed to copy: ', err));
    }

    function resetMainStatus() {
        if (confirm('Are you sure you want to reset Left Table status?')) {
            mainTracker = {};
            localStorage.removeItem('mainClickTracker');
            renderMainTable();
        }
    }

    function resetMobileStatus() {
        if (confirm('Are you sure you want to reset Right Table status?')) {
            mobileTracker = {};
            localStorage.removeItem('mobileClickTracker');
            document.getElementById('zipSearchInput').value = '';
            renderMobileTable();
        }
    }

    // ================= CARD 3 LOGIC =================
    const zipAPI = "https://api.zippopotam.us/us/";
    function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

    async function generateProfile(){
        let zip = document.getElementById("zip").value.trim();
        if(!zip){ alert("Enter ZIP Code"); return; }
        try {
            let res = await fetch(zipAPI + zip);
            if(!res.ok){ throw new Error(); }
            let data = await res.json();
            let place = data.places[0];
            let city = place["place name"];
            let state = place["state abbreviation"];
            let phone = `(${rand(200,999)}) ${rand(100,999)}-${rand(1000,9999)}`;
            let address = `${rand(100,9999)} ${streets[rand(0,streets.length-1)]}, ${city}, ${state}, ${zip}`;

            document.getElementById("zipResult").innerHTML = `
                <div id="zipCopyArea">
                    <div><span class="label">ZIP:</span> ${zip}</div>
                    <div><span class="label">City:</span> ${city}</div>
                    <div><span class="label">State:</span> ${state}</div>
                    <div style="margin-top:4px;"><span class="label">Phone:</span> ${phone}</div>
                    <div style="margin-top:4px;"><span class="label">Address:</span> ${address}</div>
                    <div style="margin-top:4px;">
                        <span class="label">Map:</span>
                        <a href="https://www.google.com/maps/search/?api=1&query=${zip}" target="_blank">Open Location</a>
                    </div>
                </div>
                <button class="btn-copy-zip" onclick="copyZipProfile(event)">Copy ZIP Profile</button>
            `;
        } catch {
            document.getElementById("zipResult").innerHTML = "❌ Invalid ZIP or API Error";
        }
    }

    function copyZipProfile(event){
        const text = document.getElementById("zipCopyArea").innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = event.target;
            btn.innerText = "✓ Copied!";
            btn.style.background = "#06b6d4";
            setTimeout(() => {
                btn.innerText = "Copy ZIP Profile";
                btn.style.background = "#22c55e";
            }, 1500);
        });
    }

    // ইনিশিয়াল লোড
    renderMainTable();
    renderMobileTable();
</script>
