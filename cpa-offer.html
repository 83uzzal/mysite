<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Rewards & Deals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --dark: #1a1a1a;
            --light: #f4f7f6;
            --success: #28a745;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px 15px;
            color: var(--dark);
        }

        header {
            text-align: center;
            padding-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: #333;
        }

        header p {
            color: #666;
            font-size: 0.9rem;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .offer-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border-left: 5px solid var(--secondary);
        }

        .offer-card:active {
            transform: scale(0.98);
        }

        .offer-info {
            flex-grow: 1;
        }

        .brand-name {
            font-weight: 700;
            font-size: 1.1rem;
            display: block;
        }

        .offer-val {
            color: var(--success);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .claim-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.3);
        }

        /* Brand Colors */
        .cashapp { border-left-color: #00d036; }
        .paypal { border-left-color: #003087; }
        .walmart { border-left-color: #ffc220; }
        .burgerking { border-left-color: #f5ebdc; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎁 Daily Rewards</h1>
        <p>Select an offer below to claim your reward</p>
    </header>

    <div class="offer-card cashapp">
        <div class="offer-info">
            <span class="brand-name">Cash App</span>
            <span class="offer-val">$1,000 Reward</span>
        </div>
        <a href="https://smrturl.co/a/s576511d9d4/16024?s1=Rolex-AlamgirX" class="claim-btn">Claim</a>
    </div>

    <div class="offer-card paypal">
        <div class="offer-info">
            <span class="brand-name">PayPal</span>
            <span class="offer-val">$750 Credit</span>
        </div>
        <a href="https://smrturl.co/a/s576511d9d4/19696?s1=Rolex-AlamgirX" class="claim-btn">Claim</a>
    </div>

    <div class="offer-card walmart">
        <div class="offer-info">
            <span class="brand-name">Walmart</span>
            <span class="offer-val">$750 Gift Card</span>
        </div>
        <a href="https://smrturl.co/a/s576511d9d4/19708?s1=Rolex-AlamgirX" class="claim-btn">Claim</a>
    </div>

    <div class="offer-card" style="border-left-color: #ff6600;">
        <div class="offer-info">
            <span class="brand-name">Ulta Beauty</span>
            <span class="offer-val">Exclusive Deal</span>
        </div>
        <a href="https://smrturl.co/a/s576511d9d4/19332?s1=Rolex-AlamgirX" class="claim-btn">Claim</a>
    </div>

    <div class="offer-card" style="border-left-color: #dd0031;">
        <div class="offer-info">
            <span class="brand-name">Chick-Fil-A</span>
            <span class="offer-val">$100 Reward</span>
        </div>
        <a href="https://smrturl.co/a/s576511d9d4/7?s1=Rolex-AlamgirX" class="claim-btn">Claim</a>
    </div>

    <div class="offer-card" style="border-left-color: #d31145;">
        <div class="offer-info">
            <span class="brand-name">Lululemon</span>
            <span class="offer-val">Gift Card Deal</span>
        </div>
        <a href="https://smrturl.co/a/s576511d9d4/15720?s1=Rolex-AlamgirX" class="claim-btn">Claim</a>
    </div>

</div>

</body>
</html>
