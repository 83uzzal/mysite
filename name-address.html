<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live ZIP Search</title>

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.box{
    width:520px;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}

h2{ text-align:center; color:#38bdf8; }

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:10px;
    line-height:1.8;
}

.label{ color:#38bdf8; font-weight:bold; }
</style>
</head>

<body>

<div class="box">

<h2>📍 LIVE ZIP SEARCH</h2>

<input id="zip" placeholder="Enter ZIP (e.g. 10039)">

<button onclick="search()">Search</button>

<div class="result" id="result"></div>

</div>

<script>

const firstNames = ["Sarah","Emily","Jessica","Michael","James","John","Emma","Olivia","David","Robert"];
const lastNames = ["Smith","Johnson","Brown","Williams","Jones","Miller","Davis","Wilson","Taylor","Anderson"];

function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function phone(area){
    return `(${area || "212"}) ${Math.floor(Math.random()*900)+100}-${Math.floor(Math.random()*9000)+1000}`;
}

async function search(){

    let zip = document.getElementById("zip").value;

    try{

        let res = await fetch(`https://api.zippopotam.us/us/${zip}`);
        let data = await res.json();

        let place = data.places[0];

        let city = place["place name"];
        let state = place["state abbreviation"];

        let seed = 0;
        for(let i=0;i<zip.length;i++){
            seed += zip.charCodeAt(i);
        }

        let first = firstNames[seed % firstNames.length];
        let last = lastNames[(seed * 3) % lastNames.length];

        document.getElementById("result").innerHTML = `

            <div><span class="label">ZIP:</span> ${zip}</div>

            <div><span class="label">City:</span> ${city}</div>

            <div><span class="label">State:</span> ${state}</div>

            <div><span class="label">Name:</span> ${first} ${last}</div>

            <div><span class="label">Phone:</span> ${phone(place["area code"])}</div>

            <div><span class="label">Address:</span>
                ${Math.floor(Math.random()*9000)+100}
                ${rand(["Main St","Oak Ave","Lake View Dr","River St"])},
                ${city}, ${state}, ${zip}, USA
            </div>

        `;

    }catch(err){
        document.getElementById("result").innerHTML =
        "❌ ZIP not found in real database";
    }
}

</script>

</body>
</html>
