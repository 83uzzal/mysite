<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic USA Profile Generator</title>

<style>
body{
    background:#111827;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    width:450px;
    background:#1f2937;
    padding:25px;
    border-radius:15px;
}

h2{
    text-align:center;
    color:#38bdf8;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:20px;
    background:#111827;
    padding:15px;
    border-radius:10px;
    line-height:1.8;
}

.label{
    color:#38bdf8;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="box">

<h2>USA Profile Generator</h2>

<input type="email" id="email" placeholder="Enter Email">

<button onclick="generateProfile()">Generate</button>

<div class="result" id="result"></div>

</div>

<script>

const commonFirst = [
"James","John","Robert","Michael","David",
"William","Joseph","Daniel","Matthew","Anthony"
];

const commonLast = [
"Smith","Johnson","Brown","Williams",
"Jones","Garcia","Miller","Davis","Wilson"
];

const states = [
"California","Texas","Florida","Nevada","Arizona"
];

const cities = [
"Los Angeles","Dallas","Miami","Las Vegas","Phoenix"
];

function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function cap(word){
    return word.charAt(0).toUpperCase() + word.slice(1);
}

function smartExtract(email){

    let username = email.split("@")[0];

    username = username.replace(/[0-9]/g,'');

    // separator based
    if(username.includes(".") || username.includes("_") || username.includes("-")){

        let parts = username.split(/[._-]/);

        let first = parts[0] ? cap(parts[0]) : rand(commonFirst);

        let last = parts[1] ? cap(parts[1]) : rand(commonLast);

        return {first,last};
    }

    // smart split long usernames
    let knownLast = commonLast.map(x=>x.toLowerCase());

    for(let last of knownLast){

        if(username.toLowerCase().endsWith(last)){

            let firstPart = username.slice(0, username.length-last.length);

            if(firstPart.length > 2){

                return {
                    first: cap(firstPart),
                    last: cap(last)
                };
            }
        }
    }

    // fallback
    return {
        first: rand(commonFirst),
        last: rand(commonLast)
    };
}

function generateProfile(){

    let email = document.getElementById("email").value;

    if(!email.includes("@")){
        alert("Invalid Email");
        return;
    }

    let name = smartExtract(email);

    let address = `
        ${Math.floor(Math.random()*9000)+100}
        Main St,
        ${rand(cities)},
        ${rand(states)}
        ${Math.floor(Math.random()*90000)+10000},
        USA
    `;

    let phone = `
        (${Math.floor(Math.random()*800)+200})
        ${Math.floor(Math.random()*900)+100}-
        ${Math.floor(Math.random()*9000)+1000}
    `;

    document.getElementById("result").innerHTML = `
        <div><span class="label">Email:</span> ${email}</div>
        <div><span class="label">First Name:</span> ${name.first}</div>
        <div><span class="label">Last Name:</span> ${name.last}</div>
        <div><span class="label">Full Name:</span> ${name.first} ${name.last}</div>
        <div><span class="label">Phone:</span> ${phone}</div>
        <div><span class="label">Address:</span> ${address}</div>
    `;
}

</script>

</body>
</html>
