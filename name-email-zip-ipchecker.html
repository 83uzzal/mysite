<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compact Marketing Tools Hub</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f0f2f5;
    padding: 15px;
    margin: 0;
}

.main-wrapper {
    display: flex;
    gap: 12px;
    max-width: 100%;
    margin: auto;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: #fff;
    padding: 12px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    box-shadow: 0 2px 4px rgba(0,0,0,.04);
    flex: 1;
    min-width: 280px;
    max-width: 340px;
    box-sizing: border-box;
}

h3 {
    margin-top: 0;
    margin-bottom: 10px;
    color: #1a1a1a;
    font-size: 14px;
    font-weight: 600;
    border-bottom: 1px solid #f0f0f0;
    padding-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}

input[type="text"] {
    width: 100%;
    padding: 6px 10px;
    font-size: 13px;
    margin-bottom: 8px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 4px;
    outline: none;
}

.btn-group {
    margin-bottom: 8px;
}

button {
    padding: 5px 10px;
    margin-right: 3px;
    margin-bottom: 4px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    font-weight: 500;
    font-size: 12px;
    transition: background 0.2s;
}

.btn-success { background: #22c55e; color: white; }
.btn-success:hover { background: #16a34a; }

.btn-primary { background: #3b82f6; color: white; }
.btn-primary:hover { background: #2563eb; }

.btn-info { background: #06b6d4; color: white; }
.btn-info:hover { background: #0891b2; }

.btn-check { background: #0d6efd; color: white; }
.btn-check:hover { background: #0b5ed7; }
.btn-export { background: #198754; color: white; }
.btn-export:hover { background: #157347; }

.status-text {
    margin: 4px 0;
    font-size: 12px;
    font-weight: bold;
    color: #666;
}

.label {
    color: #2563eb;
    font-weight: bold;
}

.display-box {
    border: 1px solid #eaeaea;
    padding: 8px;
    font-size: 12px;
    background: #f9fafb;
    height: 250px; 
    overflow-y: auto;
    border-radius: 4px;
    box-sizing: border-box;
}

.display-box div {
    padding: 2px 0;
}

.name-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #f3f4f6;
    padding: 4px 0 !important;
}

/* সিরিয়াল নাম্বারের জন্য নতুন স্টাইল */
.serial-num {
    color: #888;
    font-weight: bold;
    margin-right: 6px;
    display: inline-block;
    min-width: 24px;
}

.btn-inline-copy {
    padding: 2px 6px;
    font-size: 10px;
    margin: 0;
    background: #3b82f6;
    color: white;
}
.btn-inline-copy:hover {
    background: #2563eb;
}
.btn-inline-copy.used {
    background: #9ca3af;
    cursor: not-allowed;
}

.email-item {
    border-bottom: 1px solid #f3f4f6;
    font-family: 'Courier New', Courier, monospace;
    color: #2563eb;
}

.used-ip { color: #dc3545; font-weight: bold; }
.new-ip { color: #198754; font-weight: bold; }
.ip-links { margin-top: 8px; }
.ip-links a { color: #0d6efd; text-decoration: none; font-weight: bold; }
.ip-links a:hover { text-decoration: underline; }

.btn-copy-zip {
    background-color: #22c55e;
    color: white;
    margin-top: 8px;
    width: 100%;
    padding: 6px;
    border-radius: 4px;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="main-wrapper">

    <div class="card">
        <h3>USA Custom Names Generator</h3>
        <div class="btn-group">
            <button class="btn-success" onclick="generateNames()">Generate</button>
            <button class="btn-primary" onclick="copyNames()">Copy All</button>
            <button class="btn-info" onclick="downloadNames()">JSON</button>
        </div>
        <div id="nameCount" class="status-text">Total: 0</div>
        <div id="nameList" class="display-box">Loading names...</div>
    </div>

    <div class="card">
        <h3>Username Pattern Generator</h3>
        <input type="text" id="fullname" placeholder="Example: Callan Whitmore">
        <div class="btn-group">
            <button class="btn-success" onclick="generateEmails()">Generate</button>
            <button class="btn-primary" onclick="copyEmails()">Copy All</button>
        </div>
        <div id="emailStats" class="status-text">Total Generated: 0</div>
        <div id="emailResult" class="display-box"></div>
    </div>

    <div class="card">
        <h3>📍 ZIP Profile Generator</h3>
        <input type="text" id="zip" placeholder="Enter ZIP (e.g. 10001)">
        <div class="btn-group">
            <button class="btn-success" onclick="generateProfile()">Generate Profile</button>
        </div>
        <div class="status-text">Profile Output:</div>
        <div class="display-box" id="zipResult" style="background: #fff;">
            Enter ZIP and click generate
        </div>
    </div>

    <div class="card">
        <h3>🌐 IP Checker / Manager</h3>
        <input type="text" id="ipInput" placeholder="Enter IP (e.g. 8.8.8.8)">
        <div class="btn-group">
            <button class="btn-check" onclick="checkIP()">Check IP</button>
            <button class="btn-export" onclick="downloadIPList()">JSON Notepad</button>
        </div>
        <div class="status-text">IP Status:</div>
        <div class="display-box" id="ipResult" style="background: #fff;">
            Enter IP and click check
        </div>
    </div>

</div>

let generatedNamesList = [];
let generatedEmailsList = [];
let usedNames = new Set(); 
let activeIPs = JSON.parse(localStorage.getItem("activeIPs")) || [...hardcodedIPs];

window.onload = async function() {
    await syncUsedNamesFromCloud();

    if (localStorage.getItem('generatedNames')) {
        generatedNamesList = JSON.parse(localStorage.getItem('generatedNames'));
        document.getElementById("nameCount").innerHTML = "Total: " + generatedNamesList.length;
    } else {
        generatedNamesList = [...myCustomFullNames];
        document.getElementById("nameCount").innerHTML = "Total: " + generatedNamesList.length;
    }
    
    if (localStorage.getItem('generatedEmails')) {
        generatedEmailsList = JSON.parse(localStorage.getItem('generatedEmails'));
        document.getElementById("emailStats").innerHTML = "Total Generated: " + generatedEmailsList.length;
        renderEmails();
    }
    
    renderNames();
};

async function syncUsedNamesFromCloud() {
    if(!SHEET_API_URL || SHEET_API_URL.includes("YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE")) return;
    try {
        let response = await fetch(SHEET_API_URL);
        let data = await response.json();
        if(data && data.names) {
            usedNames = new Set(data.names);
        }
    } catch (err) {
        console.error("Cloud sync failed, switching to local backup.", err);
        if (localStorage.getItem('usedNames')) {
            usedNames = new Set(JSON.parse(localStorage.getItem('usedNames')));
        }
    }
}

// ================= CARD 1 LOGIC =================
function generateNames(){
    if (myCustomFullNames.length === 0) {
        alert("Please add some names to the 'myCustomFullNames' list inside the code!");
        return;
    }
    let shuffled = [...myCustomFullNames].sort(() => 0.5 - Math.random());
    generatedNamesList = shuffled.slice(0, 1000); 
    
    localStorage.setItem('generatedNames', JSON.stringify(generatedNamesList));
    document.getElementById("nameCount").innerHTML = "Total: " + generatedNamesList.length;
    renderNames();
}

function renderNames() {
    let html = "";
    if(generatedNamesList.length === 0) {
        document.getElementById("nameList").innerHTML = "No names available. Click Generate.";
        return;
    }
    generatedNamesList.forEach((n, index) => { 
        const isUsed = usedNames.has(n);
        html += `<div class="name-item">
            <span><span class="serial-num">${index + 1}.</span>${n}</span>
            <button class="btn-inline-copy ${isUsed ? 'used' : ''}" ${isUsed ? 'disabled' : ''} onclick="copySingleName(this, '${n.replace(/'/g, "\\'")}')">
                ${isUsed ? '✓ Used' : 'Copy'}
            </button>
        </div>`; 
    });
    document.getElementById("nameList").innerHTML = html;
}

async function copySingleName(buttonElement, nameText) {
    try {
        await navigator.clipboard.writeText(nameText);
        
        buttonElement.innerText = "⏳ Saving...";
        buttonElement.disabled = true;

        if(SHEET_API_URL && !SHEET_API_URL.includes("YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE")) {
            await fetch(SHEET_API_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "add", name: nameText })
            });
        }

        usedNames.add(nameText);
        localStorage.setItem('usedNames', JSON.stringify(Array.from(usedNames)));
        
        buttonElement.innerText = "✓ Used";
        buttonElement.classList.add("used");
    } catch (err) {
        alert("Failed to process name copy.");
        buttonElement.innerText = "Copy";
        buttonElement.disabled = false;
    }
}

function copyNames(){
    if(generatedNamesList.length === 0) { alert("Generate names first!"); return; }
    navigator.clipboard.writeText(generatedNamesList.join("\n"));
    alert("Copied " + generatedNamesList.length + " names!");
}

function downloadNames(){
    if(generatedNamesList.length === 0) { alert("Generate names first!"); return; }
    let blob = new Blob([JSON.stringify(generatedNamesList, null, 2)], {type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "usa_names.json";
    a.click();
}

// ================= CARD 2 LOGIC =================
function generateEmails(){
    let fullName = document.getElementById("fullname").value.trim().toLowerCase();
    if(!fullName){ alert("Enter a full name"); return; }

    let parts = fullName.split(/\s+/);
    let first = parts[0] || "";
    let last = parts[parts.length-1] || "";
    let formats = [];

    formats.push(first+last, first+"."+last, first+"_"+last, first+"-"+last);
    formats.push(last+first, last+"."+first, last+"_"+first, last+"-"+first);
    formats.push(first.charAt(0)+last, first+last.charAt(0), last.charAt(0)+first, last+first.charAt(0));
    formats.push(first.charAt(0)+last.charAt(0)+first, first.charAt(0)+last.charAt(0)+last);
    formats.push(first+first, last+last, first+first+last, first+last+last);

    ["official", "real", "online", "vip", "live", "hub", "pro", "world", "global", "usa"].forEach(word => {
        formats.push(first+word, first+last+word);
    });

    [1,2,3,4,5,7,8,9,11,12,21,22,23,24,69,77,88,99,100,101,111,123,321,555,777,888,999].forEach(n => {
        formats.push(first+last+n, first+"."+last+n, first+"_"+last+n, first.charAt(0)+last+n, first+last.charAt(0)+n);
    });

    for(let y=1975; y<=2025; y++){ formats.push(first+last+y, first+"."+last+y); }
    for(let y=75; y<=99; y++){ formats.push(first+last+y); }
    for(let y=0; y<=25; y++){ formats.push(first+last+String(y).padStart(2,"0")); }

    let unique = [...new Set(formats)];
    generatedEmailsList = unique.slice(0, 120).map(x => x + "@gmail.com");
    
    localStorage.setItem('generatedEmails', JSON.stringify(generatedEmailsList));
    document.getElementById("emailStats").innerHTML = "Total Generated: " + generatedEmailsList.length;
    renderEmails();
}

function renderEmails() {
    let html = "";
    generatedEmailsList.forEach(email => { html += `<div class="email-item">${email}</div>`; });
    document.getElementById("emailResult").innerHTML = html;
}

function copyEmails(){
    if(generatedEmailsList.length === 0){ alert("Generate patterns first!"); return; }
    navigator.clipboard.writeText(generatedEmailsList.join("\n"));
    alert(generatedEmailsList.length + " usernames copied.");
}

const zipAPI = "https://api.zippopotam.us/us/";
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

async function generateProfile(){
    let zip = document.getElementById("zip").value.trim();
    if(!zip){ alert("Enter ZIP Code"); return; }
    try {
        let res = await fetch(zipAPI + zip);
        if(!res.ok){ throw new Error(); }
        let data = await res.json();
        let place = data.places[0];
        let city = place["place name"];
        let state = place["state abbreviation"];
        let phone = `(${rand(200,999)}) ${rand(100,999)}-${rand(1000,9999)}`;
        let address = `${rand(100,9999)} ${streets[rand(0,streets.length-1)]}, ${city}, ${state}, ${zip}`;

        document.getElementById("zipResult").innerHTML = `
            <div id="zipCopyArea">
                <div><span class="label">ZIP:</span> ${zip}</div>
                <div><span class="label">City:</span> ${city}</div>
                <div><span class="label">State:</span> ${state}</div>
                <div style="margin-top:4px;"><span class="label">Phone:</span> ${phone}</div>
                <div style="margin-top:4px;"><span class="label">Address:</span> ${address}</div>
                <div style="margin-top:4px;">
                    <span class="label">Map:</span>
                    <a href="https://www.google.com/maps/search/?api=1&query=${zip}" target="_blank">Open Location</a>
                </div>
            </div>
            <button class="btn-copy-zip" onclick="copyZipProfile(event)">Copy ZIP Profile</button>
        `;
    } catch {
        document.getElementById("zipResult").innerHTML = "❌ Invalid ZIP or API Error";
    }
}

function copyZipProfile(event){
    const text = document.getElementById("zipCopyArea").innerText;
    navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.innerText = "✓ Copied!";
        btn.style.background = "#06b6d4";
        setTimeout(() => {
            btn.innerText = "Copy ZIP Profile";
            btn.style.background = "#22c55e";
        }, 1500);
    });
}

function saveData(){ localStorage.setItem("activeIPs", JSON.stringify(activeIPs)); }

function checkIP(){
    let ip = document.getElementById("ipInput").value.trim();
    let box = document.getElementById("ipResult");
    if(!ip){ alert("Enter IP address"); return; }

    let isUsed = activeIPs.includes(ip);
    const ip8 = `https://www.whatismyip.com/ip/${ip}`;
    const scam = `https://scamalytics.com/ip/${ip}`;

    if(isUsed){
        box.innerHTML = `
            <div class="used-ip">❌ USED IP</div>
            <div style="margin-top:4px;"><strong>${ip}</strong></div>
            <div class="ip-links">
                <a href="${ip8}" target="_blank">IP Lookup</a> |
                <a href="${scam}" target="_blank">Scam Check</a>
            </div>
        `;
    } else {
        activeIPs.push(ip);
        saveData();
        box.innerHTML = `
            <div class="new-ip">✅ NEW IP ADDED</div>
            <div style="margin-top:4px;"><strong>${ip}</strong></div>
            <div style="margin-top:4px; color:#555;">Total Stored: ${activeIPs.length}</div>
            <div class="ip-links">
                <a href="${ip8}" target="_blank">IP Lookup</a> |
                <a href="${scam}" target="_blank">Scam Check</a>
            </div>
        `;
    }
    document.getElementById("ipInput").value = "";
}

function downloadIPList(){
    let uniqueIPs = [...new Set(activeIPs)];
    let text = "const hardcodedIPs = [\n";
    uniqueIPs.forEach((ip, i) => { 
        text += `    "${ip}"${i < uniqueIPs.length - 1 ? "," : ""}\n`; 
    });
    text += "];";

    const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "hardcodedIPs.txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
