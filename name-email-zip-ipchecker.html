<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compact Marketing Tools Hub</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f0f2f5;
    padding: 15px;
    margin: 0;
}

/* ৪টি বক্স পাশাপাশি সুন্দরভাবে সাজানোর জন্য Flexbox Layout */
.main-wrapper {
    display: flex;
    gap: 12px;
    max-width: 100%;
    margin: auto;
    flex-wrap: wrap; /* স্ক্রিন ছোট হলে নিচে নেমে যাবে */
    justify-content: center;
}

/* বক্সের সাইজ Compact রাখা হয়েছে */
.card {
    background: #fff;
    padding: 12px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    box-shadow: 0 2px 4px rgba(0,0,0,.04);
    flex: 1;
    min-width: 280px; /* বক্সের সর্বনিম্ন প্রস্থ */
    max-width: 340px; /* বক্স যেন অতিরিক্ত বড় না হয় */
    box-sizing: border-box;
}

h3 {
    margin-top: 0;
    margin-bottom: 10px;
    color: #1a1a1a;
    font-size: 14px;
    font-weight: 600;
    border-bottom: 1px solid #f0f0f0;
    padding-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}

/* ইনপুট ফিল্ড স্টাইলিং */
input[type="text"] {
    width: 100%;
    padding: 6px 10px;
    font-size: 13px;
    margin-bottom: 8px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 4px;
    outline: none;
}

.btn-group {
    margin-bottom: 8px;
}

/* বোতামগুলোর স্টাইল */
button {
    padding: 5px 10px;
    margin-right: 3px;
    margin-bottom: 4px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    font-weight: 500;
    font-size: 12px;
    transition: background 0.2s;
}

.btn-success { background: #22c55e; color: white; }
.btn-success:hover { background: #16a34a; }

.btn-primary { background: #3b82f6; color: white; }
.btn-primary:hover { background: #2563eb; }

.btn-info { background: #06b6d4; color: white; }
.btn-info:hover { background: #0891b2; }

/* স্ট্যাটাস ও লেবেল টেক্সট */
.status-text {
    margin: 4px 0;
    font-size: 12px;
    font-weight: bold;
    color: #666;
}

.label {
    color: #2563eb;
    font-weight: bold;
}

/* ডিসপ্লে বক্স স্ক্রলিং এরিয়া */
.display-box {
    border: 1px solid #eaeaea;
    padding: 8px;
    font-size: 12px;
    background: #f9fafb;
    height: 250px; 
    overflow-y: auto;
    border-radius: 4px;
    box-sizing: border-box;
}

.display-box div {
    padding: 2px 0;
}

/* ইন্ডিভিজুয়াল নাম ও বাটনের জন্য স্টাইল */
.name-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #f3f4f6;
    padding: 4px 0 !important;
}

.btn-inline-copy {
    padding: 2px 6px;
    font-size: 10px;
    margin: 0;
    background: #3b82f6;
    color: white;
}
.btn-inline-copy:hover {
    background: #2563eb;
}
.btn-inline-copy.used {
    background: #9ca3af;
    cursor: not-allowed;
}

.email-item {
    border-bottom: 1px solid #f3f4f6;
    font-family: 'Courier New', Courier, monospace;
    color: #2563eb;
}

/* IP Checker Links Buttons */
.ipBtns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
}

.ipBtns a {
    background: #f59e0b;
    color: white;
    text-align: center;
    padding: 8px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: bold;
    font-size: 11px;
    transition: opacity 0.2s;
}

.ipBtns a:hover {
    opacity: .9;
}

a {
    color: #3b82f6;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

.btn-copy-zip {
    background-color: #22c55e;
    color: white;
    margin-top: 8px;
    width: 100%;
    padding: 6px;
    border-radius: 4px;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="main-wrapper">

    <div class="card">
        <h3>USA 1000 Names Generator</h3>
        
        <div class="btn-group">
            <button class="btn-success" onclick="generateNames()">Generate</button>
            <button class="btn-primary" onclick="copyNames()">Copy All</button>
            <button class="btn-info" onclick="downloadNames()">JSON</button>
        </div>

        <div id="nameCount" class="status-text">Total: 0</div>
        <div id="nameList" class="display-box"></div>
    </div>

    <div class="card">
        <h3>Username Pattern Generator</h3>
        
        <input type="text" id="fullname" placeholder="Example: Callan Whitmore">
        
        <div class="btn-group">
            <button class="btn-success" onclick="generateEmails()">Generate</button>
            <button class="btn-primary" onclick="copyEmails()">Copy All</button>
        </div>

        <div id="emailStats" class="status-text">Total Generated: 0</div>
        <div id="emailResult" class="display-box"></div>
    </div>

    <div class="card">
        <h3>📍 ZIP Profile Generator</h3>
        
        <input type="text" id="zip" placeholder="Enter ZIP (e.g. 10001)">
        
        <div class="btn-group">
            <button class="btn-success" onclick="generateProfile()">Generate Profile</button>
        </div>

        <div class="status-text">Profile Output:</div>
        <div class="display-box" id="zipResult" style="background: #fff;">
            Enter ZIP and click generate
        </div>
    </div>

    <div class="card">
        <h3>🌐 IP Checker</h3>
        
        <input type="text" id="ipInput" placeholder="Enter IP (e.g. 8.8.8.8)">
        
        <div class="btn-group">
            <button class="btn-success" onclick="checkIP()">Check Details</button>
        </div>

        <div class="status-text">IP Status:</div>
        <div class="display-box" id="ipResult" style="background: #fff;">
            Enter IP and click check
        </div>
    </div>

</div>

<script>
let generatedNamesList = [];
let generatedEmailsList = [];

const firstNames = [
    "James","John","Robert","Michael","William","David","Richard","Joseph","Thomas","Charles",
    "Christopher","Daniel","Matthew","Anthony","Mark","Donald","Steven","Paul","Andrew","Joshua",
    "Kenneth","Kevin","Brian","George","Timothy","Ronald","Jason","Edward","Jeffrey","Ryan",
    "Jacob","Gary","Nicholas","Eric","Jonathan","Stephen","Larry","Justin","Scott","Brandon",
    "Benjamin","Samuel","Gregory","Alexander","Patrick","Frank","Raymond","Jack","Dennis","Jerry"
];

const lastNames = [
    "Smith","Johnson","Williams","Brown","Jones","Garcia","Miller","Davis","Rodriguez","Martinez",
    "Hernandez","Lopez","Gonzalez","Wilson","Anderson","Thomas","Taylor","Moore","Jackson","Martin",
    "Lee","Perez","Thompson","White","Harris","Sanchez","Clark","Ramirez","Lewis","Robinson",
    "Walker","Young","Allen","King","Wright","Scott","Torres","Nguyen","Hill","Flores",
    "Green","Adams","Nelson","Baker","Hall","Rivera","Campbell","Mitchell","Carter","Roberts"
];

const streets = [
    "Main St","Oak Ave","Lake View Dr","Sunset Blvd","Hill Rd","River St","Park Ave","Broadway"
];

function generateNames(){
    generatedNamesList = [];
    let set = new Set();
    while(set.size < 1000){
        let f = firstNames[Math.floor(Math.random()*firstNames.length)];
        let l = lastNames[Math.floor(Math.random()*lastNames.length)];
        set.add(f + " " + l);
    }
    generatedNamesList = Array.from(set);
    document.getElementById("nameCount").innerHTML = "Total: " + generatedNamesList.length;
    
    let html = "";
    generatedNamesList.forEach((n, index) => { 
        html += `<div class="name-item">
            <span>${n}</span>
            <button class="btn-inline-copy" onclick="copySingleName(this, '${n.replace(/'/g, "\\'")}')">Copy</button>
        </div>`; 
    });
    document.getElementById("nameList").innerHTML = html;
}

function copySingleName(buttonElement, nameText) {
    navigator.clipboard.writeText(nameText).then(() => {
        buttonElement.innerText = "✓ Used";
        buttonElement.classList.add("used");
        buttonElement.disabled = true; // একবার কপি হলে বাটনটি ডিজেবল হয়ে যাবে
    }).catch(err => {
        alert("Failed to copy name.");
    });
}

function copyNames(){
    if(generatedNamesList.length === 0) { alert("Generate names first!"); return; }
    navigator.clipboard.writeText(generatedNamesList.join("\n"));
    alert("Copied " + generatedNamesList.length + " names!");
}

function downloadNames(){
    if(generatedNamesList.length === 0) { alert("Generate names first!"); return; }
    let blob = new Blob([JSON.stringify(generatedNamesList, null, 2)], {type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "usa_names.json";
    a.click();
}

function generateEmails(){
    let fullName = document.getElementById("fullname").value.trim().toLowerCase();
    if(!fullName){ alert("Enter a full name"); return; }

    let parts = fullName.split(/\s+/);
    let first = parts[0] || "";
    let last = parts[parts.length-1] || "";
    let formats = [];

    formats.push(first+last, first+"."+last, first+"_"+last, first+"-"+last);
    formats.push(last+first, last+"."+first, last+"_"+first, last+"-"+first);
    formats.push(first.charAt(0)+last, first+last.charAt(0), last.charAt(0)+first, last+first.charAt(0));
    formats.push(first.charAt(0)+last.charAt(0)+first, first.charAt(0)+last.charAt(0)+last);
    formats.push(first+first, last+last, first+first+last, first+last+last);

    ["official", "real", "online", "vip", "live", "hub", "pro", "world", "global", "usa"].forEach(word => {
        formats.push(first+word, first+last+word);
    });

    [1,2,3,4,5,7,8,9,11,12,21,22,23,24,69,77,88,99,100,101,111,123,321,555,777,888,999].forEach(n => {
        formats.push(first+last+n, first+"."+last+n, first+"_"+last+n, first.charAt(0)+last+n, first+last.charAt(0)+n);
    });

    for(let y=1975; y<=2025; y++){ formats.push(first+last+y, first+"."+last+y); }
    for(let y=75; y<=99; y++){ formats.push(first+last+y); }
    for(let y=0; y<=25; y++){ formats.push(first+last+String(y).padStart(2,"0")); }

    let unique = [...new Set(formats)];
    generatedEmailsList = unique.slice(0, 120).map(x => x + "@gmail.com");
    document.getElementById("emailStats").innerHTML = "Total Generated: " + generatedEmailsList.length;

    let html = "";
    generatedEmailsList.forEach(email => { html += `<div class="email-item">${email}</div>`; });
    document.getElementById("emailResult").innerHTML = html;
}

function copyEmails(){
    if(generatedEmailsList.length === 0){ alert("Generate patterns first!"); return; }
    navigator.clipboard.writeText(generatedEmailsList.join("\n"));
    alert(generatedEmailsList.length + " usernames copied.");
}

// ================= ZIP PROFILE LOGIC =================
const zipAPI = "https://api.zippopotam.us/us/";

function rand(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

async function generateProfile(){
    let zip = document.getElementById("zip").value.trim();
    if(!zip){ alert("Enter ZIP Code"); return; }

    try {
        let res = await fetch(zipAPI + zip);
        if(!res.ok){ throw new Error(); }
        let data = await res.json();
        let place = data.places[0];
        let city = place["place name"];
        let state = place["state abbreviation"];

        let phone = `(${rand(200,999)}) ${rand(100,999)}-${rand(1000,9999)}`;
        let address = `${rand(100,9999)} ${streets[rand(0,streets.length-1)]}, ${city}, ${state}, ${zip}`;

        document.getElementById("zipResult").innerHTML = `
            <div id="zipCopyArea">
                <div><span class="label">ZIP:</span> ${zip}</div>
                <div><span class="label">City:</span> ${city}</div>
                <div><span class="label">State:</span> ${state}</div>
                <div style="margin-top:4px;"><span class="label">Phone:</span> ${phone}</div>
                <div style="margin-top:4px;"><span class="label">Address:</span> ${address}</div>
                <div style="margin-top:4px;">
                    <span class="label">Map:</span>
                    <a href="https://www.google.com/maps/search/?api=1&query=${zip}" target="_blank">Open Location</a>
                </div>
            </div>
            <button class="btn-copy-zip" onclick="copyZipProfile(event)">Copy ZIP Profile</button>
        `;
    } catch {
        document.getElementById("zipResult").innerHTML = "❌ Invalid ZIP or API Error";
    }
}

function copyZipProfile(event){
    const text = document.getElementById("zipCopyArea").innerText;
    navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.innerText = "✓ Copied!";
        btn.style.background = "#06b6d4";
        setTimeout(() => {
            btn.innerText = "Copy ZIP Profile";
            btn.style.background = "#22c55e";
        }, 1500);
    });
}

// ================= IP CHECKER LOGIC =================
function checkIP(){
    let ip = document.getElementById("ipInput").value.trim();
    if(!ip){ alert("Enter IP Address"); return; }

    let ip8Link = `https://www.whatismyip.com/ip/${ip}`;
    let scamLink = `https://scamalytics.com/ip/${ip}`;

    document.getElementById("ipResult").innerHTML = `
        <div><span class="label">IP:</span> ${ip}</div>
        <div class="ipBtns">
            <a href="${ip8Link}" target="_blank">IP8 CHECK</a>
            <a href="${scamLink}" target="_blank">SCAMALYTICS</a>
        </div>
        <div style="margin-top:10px;">
            <span class="label">IP8 Direct:</span><br>
            <a href="${ip8Link}" target="_blank" style="font-size:11px;">${ip8Link}</a>
        </div>
        <div style="margin-top:8px;">
            <span class="label">Scamalytics Direct:</span><br>
            <a href="${scamLink}" target="_blank" style="font-size:11px;">${scamLink}</a>
        </div>
    `;
}
</script>

</body>
</html>
