<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>USA Offers</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #eee; margin: 0; padding: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; max-width: 400px; margin: auto; }
        
        /* ছোট কার্ড ডিজাইন */
        .card { background: #fff; padding: 8px; border-radius: 5px; text-align: center; border: 1px solid #ddd; }
        .card h3 { margin: 0 0 5px; font-size: 11px; color: #333; height: 25px; line-height: 1.1; overflow: hidden; }
        
        /* ছোট ও চিকন বাটন */
        .btn { display: block; background: #27ae60; color: #fff; text-decoration: none; padding: 5px 0; border-radius: 3px; font-size: 10px; font-weight: bold; }
        .btn:active { transform: scale(0.95); background: #1e8449; }
        
        /* স্পেশাল কালার */
        .amazon { background: #f39c12; }
        .ebike { background: #e74c3c; grid-column: span 2; display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; }
        .ebike h3 { height: auto; margin: 0; }
        .ebike .btn { width: 80px; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card">
        <h3>Amazon $1,000</h3>
        <a href="https://www.af9m8trk.com/TEY11AEP/PL6125DB" class="btn amazon">Claim Now</a>
    </div>

    <div class="card">
        <h3>McDonald's $100</h3>
        <a href="https://www.af9m8trk.com/TEY11AEP/UPW123XH" class="btn">Get Coupon</a>
    </div>

    <div class="card">
        <h3>Target $750</h3>
        <a href="https://www.af9m8trk.com/TEY11AEP/HMG123XJ" class="btn">Enter Now</a>
    </div>

    <div class="card">
        <h3>American Airlines Jobs (US)</h3>
        <a href="https://www.af9m8trk.com/TEY11AEP/TWW123FR" class="btn">Check Prize</a>
    </div>

    <div class="card ebike">
        <h3>Amazon $1,000 - CPL (US)</h3>
        <a href="https://www.af9m8trk.com/TEY11AEP/TJ2123FW" class="btn">Enter</a>
    </div>
</div>

</body>
</html>
