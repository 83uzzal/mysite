<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZIP → Realistic USA Profile (No Mismatch)</title>

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.box{
    width:520px;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}

h2{
    text-align:center;
    color:#38bdf8;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:10px;
    line-height:1.8;
}

.label{ color:#38bdf8; font-weight:bold; }

a{ color:#38bdf8; }
</style>
</head>

<body>

<div class="box">

<h2>📍 ZIP → USA PROFILE SYSTEM</h2>

<input id="zip" placeholder="Enter ZIP (e.g. 10001)">

<button onclick="generate()">Generate</button>

<div class="result" id="result"></div>

</div>

<script>

// ---------------- API ----------------
const zipAPI = "https://api.zippopotam.us/us/";

// ---------------- DATA ----------------
const firstNames = [
"James","John","Robert","Michael","William",
"David","Joseph","Thomas","Charles","Christopher",
"Jessica","Emily","Sarah","Ashley","Emma","Olivia"
];

const lastNames = [
"Smith","Johnson","Brown","Williams","Jones",
"Miller","Davis","Wilson","Taylor","Anderson"
];

const streets = [
"Main St","Oak Ave","Lake View Dr","Sunset Blvd",
"Hill Rd","River St","Park Ave","Broadway"
];

// ---------------- MAIN ----------------

async function generate(){

    let zip = document.getElementById("zip").value;

    try{

        // REAL ZIP DATA
        let res = await fetch(zipAPI + zip);
        let data = await res.json();

        let place = data.places[0];
        let city = place["place name"];
        let state = place["state abbreviation"];

        // stable seed
        let seed = 0;
        for(let i=0;i<zip.length;i++){
            seed += zip.charCodeAt(i);
        }

        let first = firstNames[seed % firstNames.length];
        let last = lastNames[(seed * 2) % lastNames.length];

        // email
        let email = `${first.toLowerCase()}${last.toLowerCase()}@gmail.com`;

        // phone
        let phone = `(212) ${Math.floor(Math.random()*900)+100}-${Math.floor(Math.random()*9000)+1000}`;

        // random street + house (ONLY DISPLAY)
        let street = streets[Math.floor(Math.random()*streets.length)];
        let house = Math.floor(Math.random()*9000)+100;

        let displayAddress = `${house} ${street}, ${city}, ${state}, ${zip}, USA`;

        // real map (NO MISMATCH)
        let geo = await fetch(
            `https://nominatim.openstreetmap.org/search?format=json&q=${zip},USA`
        );

        let geoData = await geo.json();
        let lat = geoData[0].lat;
        let lon = geoData[0].lon;

        let mapLink = `https://www.google.com/maps?q=${lat},${lon}`;

        // OUTPUT
        document.getElementById("result").innerHTML = `

            <div><span class="label">ZIP:</span> ${zip}</div>

            <div><span class="label">City:</span> ${city}</div>

            <div><span class="label">State:</span> ${state}</div>

            <div><span class="label">Name:</span> ${first} ${last}</div>

            <div><span class="label">Email:</span> ${email}</div>

            <div><span class="label">Phone:</span> ${phone}</div>

            <div><span class="label">Address:</span> ${displayAddress}</div>

            <div><span class="label">Map:</span>
                <a href="${mapLink}" target="_blank">Open Location</a>
            </div>

        `;

    }catch(err){
        document.getElementById("result").innerHTML =
        "❌ Invalid ZIP or API error";
    }
}

</script>

</body>
</html>
