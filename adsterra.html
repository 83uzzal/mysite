<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adsterra Real Balance</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .balance { color: #27ae60; font-size: 2.5rem; font-weight: 800; margin: 15px 0; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h3>Adsterra Balance</h3>
    <div id="balance" class="balance">Loading...</div>
    <button class="btn" onclick="sendToTelegram()">Send to Telegram</button>
    <p id="status"></p>
</div>

<script>
    const adsterra_api = '715e55d346ca162105ae15021869de2b';
    const botToken = "8658112528:AAF8nhTpsN6rUmfYrqrzxevKxcmV9lD5t7s";
    const chatId = "-1003956397850";

    // Adsterra থেকে ডাটা আনার চেষ্টা (JavaScript দিয়ে)
    async function getBalance() {
        try {
            // Note: Directly calling Adsterra API from Browser might be blocked by CORS
            const response = await fetch('https://api.adsterra.com/publisher/v1/balance.json', {
                headers: { 'X-API-Key': adsterra_api }
            });
            const data = await response.json();
            document.getElementById('balance').innerText = '$' + (data.balance || '0.00');
        } catch (e) {
            document.getElementById('balance').innerText = 'Check API';
        }
    }

    async function sendToTelegram() {
        const balance = document.getElementById('balance').innerText;
        const text = `📢 *Adsterra Alert*\n💰 Balance: ${balance}\n🌐 usaoffers.online`;
        
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'Markdown' })
        });
        document.getElementById('status').innerText = "✅ Sent!";
    }

    getBalance();
</script>
</body>
</html>
