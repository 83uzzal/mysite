<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adsterra Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{margin-bottom:20px;}

.value{
    font-size:32px;
    font-weight:bold;
    color:#2ecc71;
}

button{
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    background:#007bff;
    color:#fff;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.status{
    margin-top:10px;
    font-size:14px;
    color:#666;
}
</style>
</head>

<body>

<div class="card">

    <h2>📊 Adsterra Dashboard</h2>

    <div class="value" id="balance">$0.00</div>
    <p>Clicks: <span id="clicks">0</span></p>

    <!-- BUTTON -->
    <button onclick="loadData()">🔄 Get Report</button>

    <div class="status" id="status">Ready</div>

</div>

<script>
async function loadData() {

    let status = document.getElementById("status");
    status.innerText = "⏳ Loading...";

    try {

        let url = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnRq61e3M4EQwAjeX9JW2PJHt1Ks2scQnhGMG00mrgmZv-cEiU6pei_CVj_RWvES0_CdzCHJiyh5pBoP1VJ2TkdDpNO3Ts1mnKcuBkHQ0SC5RMuUsS-34K25MlbiTV9AkxubXBEMQpT1Iz_bjF7RE04Ckjrjk8EINNVTJ61aFjsoK_4x4Fkoj2zSOMfxhqNjf6o08O7iaP_xdeX9l6ZAFPMckzoy04zdCVRkHY7TkmuWJ3hjSsQ&lib=MZxsJpbXNCYHCuX3ELwBgGre79OrBm0eD";

        let res = await fetch(url);
        let data = await res.json();

        document.getElementById("balance").innerText = "$" + data.revenue;
        document.getElementById("clicks").innerText = data.clicks;

        status.innerText = "✅ Success";

    } catch (err) {
        console.log(err);
        status.innerText = "❌ Error loading data";
    }
}
</script>

</body>
</html>
