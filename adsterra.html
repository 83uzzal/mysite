<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adsterra Dashboard</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    width:320px;
    text-align:center;
}

h2{
    margin-bottom:20px;
}

.value{
    font-size:32px;
    font-weight:bold;
    color:#2ecc71;
}

.btn{
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    background:#007bff;
    color:white;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#0056b3;
}

.status{
    margin-top:10px;
    font-size:14px;
    color:#888;
}
</style>
</head>

<body>

<div class="card">

    <h2>📊 Adsterra Dashboard</h2>

    <div class="value" id="balance">$0.00</div>
    <p>Clicks: <span id="clicks">0</span></p>

    <button class="btn" onclick="loadData()">🔄 Get Report</button>

    <div class="status" id="status">Click button to load data</div>

</div>

<script>
async function loadData() {

    let status = document.getElementById("status");
    status.innerText = "⏳ Loading...";

    try {
        let res = await fetch("YOUR_GOOGLE_SCRIPT_URL");
        let data = await res.json();

        document.getElementById("balance").innerText = "$" + data.revenue;
        document.getElementById("clicks").innerText = data.clicks;

        status.innerText = "✅ Data loaded successfully";

    } catch (error) {
        status.innerText = "❌ Error loading data";
        console.log(error);
    }
}
</script>

</body>
</html>
