<script>
async function fetchAdsterraData() {
    const statusDiv = document.getElementById('status');
    const balanceDiv = document.getElementById('balance-display');

    statusDiv.innerText = "🔄 Connecting...";
    statusDiv.className = "loading";

    try {
        const res = await fetch("backend.php?key=12345"); // secure key
        const data = await res.json();

        balanceDiv.innerText = "$" + data.balance;

        statusDiv.innerText = "✅ Synced!";
        statusDiv.className = "success";

    } catch (err) {
        statusDiv.innerText = "❌ Error!";
        statusDiv.className = "error";
    }
}
</script>
