<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adsterra Telegram Notifier</title>
    <style>
        :root {
            --primary-color: #0088cc;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .adsterra-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
        }

        .header h2 { margin: 0; color: #333; font-size: 1.6rem; }
        .domain { color: var(--primary-color); font-weight: 600; margin-bottom: 25px; display: block; text-decoration: none; }

        .stat-box {
            background: #f8f9fa;
            border: 2px solid #edf0f2;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .balance-label { font-size: 0.95rem; color: #777; font-weight: 500; }
        .balance-amount { font-size: 2.2rem; font-weight: 800; color: #27ae60; display: block; margin-top: 5px; }

        .btn-send {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 136, 204, 0.2);
        }
        .btn-send:hover { background: #0077b5; transform: translateY(-1px); }
        .btn-send:active { transform: translateY(0); }
        
        #status-msg { margin-top: 20px; font-size: 0.9rem; font-weight: 500; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="adsterra-card">
    <div class="header">
        <h2>Adsterra Publisher</h2>
        <a href="https://www.usaoffers.online" class="domain">www.usaoffers.online</a>
    </div>

    <div class="stat-box">
        <span class="balance-label">Current Balance</span>
        <span class="balance-amount" id="balance">$0.00</span>
    </div>

    <button class="btn-send" onclick="sendToTelegram()">Send Update to Telegram</button>
    <p id="status-msg"></p>
</div>

<script>
    // আপনার নতুন এবং সঠিক তথ্য
    const botToken = "8658112528:AAF8nhTpsN6rUmfYrqrzxevKxcmV9lD5t7s";
    const chatId = "-1003956397850";
    const panelName = "Alamgir";

    async function sendToTelegram() {
        const msgElement = document.getElementById('status-msg');
        const balance = document.getElementById('balance').innerText;
        
        msgElement.innerText = "Sending notification to @Affimine_bot...";
        msgElement.style.color = "#0088cc";

        // সুন্দর মেসেজ ফরম্যাট
        const text = `📢 *Affimine New Alert* 🚨\n\n` +
                     `🌐 *Domain:* usaoffers.online\n` +
                     `💰 *Payout Balance:* ${balance}\n` +
                     `💻 *Panel:* ${panelName}\n\n` +
                     `✅ *Status:* Sent via Web Portal ❤️`;

        const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: text,
                    parse_mode: 'Markdown'
                })
            });

            const result = await response.json();

            if (response.ok) {
                msgElement.innerText = "✅ সফলভাবে টেলিগ্রামে পাঠানো হয়েছে!";
                msgElement.style.color = "#27ae60";
            } else {
                msgElement.innerText = "❌ ভুল: " + (result.description || "Unknown error");
                msgElement.style.color = "#e74c3c";
            }
        } catch (error) {
            msgElement.innerText = "❌ নেটওয়ার্ক কানেকশন চেক করুন!";
            msgElement.style.color = "#e74c3c";
        }
    }
</script>

</body>
</html>
