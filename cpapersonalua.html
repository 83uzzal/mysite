<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced UA Generator + ZIP + IP Checker</title>

<style>

:root{
    --bg:#0d1117;
    --card:#161b22;
    --blue:#3fb1e3;
    --text:#c9d1d9;
    --border:#30363d;
    --green:#238636;
    --orange:#f59e0b;
}

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    overflow-x:hidden;
}

/* BODY */

body{
    background-color:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:6px;
    min-height:100vh;
}

/* WRAPPER */

.wrapper{
    width:100%;
    max-width:1200px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:6px;
}

/* BOX */

.container{
    background-color:var(--card);
    width:100%;
    border-radius:8px;
    border:1px solid var(--border);
    padding:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* HEADER */

.header{
    text-align:center;
    color:var(--blue);
    font-size:13px;
    font-weight:700;
    margin-bottom:8px;
    text-transform:uppercase;
    border-bottom:1px solid var(--border);
    padding-bottom:4px;
    letter-spacing:0.5px;
}

/* LABEL */

label{
    display:block;
    margin-bottom:4px;
    font-size:12px;
    color:var(--blue);
    font-weight:600;
}

/* INPUT */

select,
input,
button{
    width:100%;
    padding:4px 8px;
    margin-bottom:6px;
    border-radius:6px;
    outline:none;
    font-size:11px;
    background-color:var(--bg);
    color:#fff;
    border:1px solid var(--border);
}

select{
    cursor:pointer;
}

/* BUTTON */

button{
    cursor:pointer;
    transition:0.25s;
}

/* GENERATE BUTTON */

.btn-gen{
    background-color:var(--blue);
    color:#000;
    font-weight:700;
    border:none;
}

.btn-gen:hover{
    opacity:0.85;
}

/* COPY BUTTON */

.btn-copy{
    background-color:var(--green);
    border:none;
    margin-top:10px;
    font-weight:700;
    color:#fff;
}

.btn-copy:hover{
    opacity:0.9;
}

/* DETAILS */

.details-box{
    background-color:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
    display:none;
    margin-top:6px;
}

/* ROW */

.row{
    display:flex;
    justify-content:flex-start;
    align-items:flex-start;
    gap:5px;
    margin-bottom:2px;
    font-size:10px;
    border-bottom:1px solid #1f242c;
    padding-bottom:1px;
    line-height:1.3;
}
.row:hover {
    background-color: #1c2128;
}
/* KEY */

.key{
    color:var(--blue);
    font-weight:700;
    white-space:nowrap;
    min-width:75px;
}

/* VALUE */

.val{
    color:#fff;
    word-break:break-word;
}

/* UA OUTPUT */

.ua-output{
    background-color:#090c10;
    border:1px dotted var(--blue);
    padding:8px;
    border-radius:6px;
    margin-top:10px;
    word-break:break-all;
    font-family:monospace;
    color:var(--blue);
    font-size:10px;
    line-height:1.35;
    overflow-wrap:anywhere;
}

/* RESULT */

.result{
    margin-top:8px;
    background:#0f172a;
    padding:8px;
    border-radius:8px;
    line-height:1.45;
    word-break:break-word;
    border:1px solid #334155;
    font-size:10px;
}

/* LABEL */

.label{
    color:#38bdf8;
    font-weight:bold;
}

/* IP BUTTONS */

.ipBtns{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:10px;
}

.ipBtns a{
    background:var(--orange);
    color:black;
    text-align:center;
    padding:10px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    font-size:12px;
}

.ipBtns a:hover{
    opacity:.92;
}

a{
    color:#38bdf8;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

/* MOBILE */

@media(max-width:1100px){

    .wrapper{
        grid-template-columns:1fr;
    }

}

@media(max-width:480px){

    body{
        padding:4px;
    }

    .container{
        padding:10px;
        border-radius:8px;
    }

    .header{
        font-size:14px;
    }

    select,
    input,
    button{
        font-size:11px;
        padding:7px 8px;
    }

    .row{
        font-size:10px;
    }

    .ua-output{
        font-size:10px;
    }

    .result{
        font-size:10px;
    }
}
#zipResult div{
    cursor:pointer;
    padding:2px 4px;
    border-radius:4px;
}

#zipResult div:hover{
    background:#1c2128;
}
</style>
</head>

// ================= GENERATE UA =================

    const d = devices[dSelect.value];

    const b = document.getElementById('browserSelect').value;

    const ver = browserVers[b][Math.floor(Math.random()*browserVers[b].length)];

    let ua = "";

let iosMainVersion = d.os.match(/\d+/)[0];
let iosMinor = Math.floor(Math.random() * 5);
let iosFormatted = `${iosMainVersion}_${iosMinor}`;

        if(b === "Safari"){

            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosFormatted} like Mac OS X) AppleWebKit/${webkitVer} (KHTML, like Gecko) Version/${iosMainVersion}.4 Mobile/15E148 Safari/${webkitVer}`;

        else if(b === "Chrome"){

            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosFormatted} like Mac OS X) AppleWebKit/${webkitVer} (KHTML, like Gecko) CriOS/${ver} Mobile/15E148 Safari/${webkitVer}`;

        }

        else if(b === "Edge"){

            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosFormatted} like Mac OS X) AppleWebKit/${webkitVer} (KHTML, like Gecko) EdgiOS/${ver} Mobile/15E148 Safari/${webkitVer}`;

        }

        }

    }

    else{

        }

        else if(b === "Safari"){

            ua = `Mozilla/5.0 (Linux; Android ${andVer}; ${d.model}) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Mobile Safari/537.36`;

        }

else {
    // 🌟 এখানে ডাইনামিক অ্যান্ড্রয়েড ভার্সন এবং মডেল সেট করা হলো
    ua = `Mozilla/5.0 (Linux; Android ${andVer}; ${d.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${ver} Mobile Safari/537.36`;
}

    } // এই ব্র্যাকেটটি হলো if-else এর শেষ সীমা

    let finalVendor = d.webgl_vendor;
    let finalRenderer = d.webgl_renderer;

    if (d.brand !== "Apple") {
        if (b === "Firefox") {
            finalVendor = d.webgl_vendor.replace("Google Inc. ", "");
        } else if (b === "Chrome" || b === "Edge") {
            let match = d.webgl_vendor.match(/\(([^)]+)\)/);
            if (match && match[1]) {
                finalVendor = "Google Inc. (" + match[1] + ")";
            } else {
                finalVendor = d.webgl_vendor; 
            }
        }
    }

    const infoFields = [

        ["Model:", d.brand + " " + d.model],
        ["Chipset:", d.chipset],
        ["CPU:", d.cpu],
        ["RAM:", d.ram],

        ["Viewport:", d.viewport],
        ["Timezone:", "America/New_York"],
		["WebGL Vendor:", finalVendor],
		["Renderer:", finalRenderer]

    ];

    let html = "";

infoFields.forEach(f => {
    // এখানে onclick="copyRow(this)" এবং title যুক্ত করা হয়েছে
    html += `<div class="row" onclick="copyRow(this)" title="Click to copy value" style="cursor: pointer;"><span class="key">${f[0]}</span><span class="val">${f[1]}</span></div>`;
});

    document.getElementById('infoRows').innerHTML = html;

    document.getElementById('uaOutput').innerText = ua;

    document.getElementById('detailsArea').style.display = 'block';

}

// ================= COPY UA =================

function copyUA(){

    const uaText = document.getElementById('uaOutput').innerText;

    navigator.clipboard.writeText(uaText).then(() => {

        const copyBtn = document.getElementById('copyBtn');

        copyBtn.innerText = "✓ Copied!";

        copyBtn.style.backgroundColor = "#17a2b8";

        setTimeout(() => {

            copyBtn.innerText = "Copy User Agent";

            copyBtn.style.backgroundColor = "var(--green)";

        },1500);

    });

}

// ================= RANDOM FUNCTION (ADD THIS - REQUIRED) =================

function rand(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ================= STREET + HOUSE NUMBER (FIXED) =================

function generateStreet(){
    return `${rand(100, 9999)} ${streets[rand(0, streets.length - 1)]}`;
}
// ================= COPY FUNCTION =================

function copyText(el){

const val = el.querySelector('.label')
    ? el.innerText.replace(el.querySelector('.label').innerText, '').trim()
    : el.innerText.trim();

    navigator.clipboard.writeText(val).then(() => {

        el.style.background = "#1f2a37";

        setTimeout(() => {
            el.style.background = "";
        }, 300);

    });
}

// ================= GENERATE PROFILE =================

async function generateProfile(){

    let zip = document.getElementById("zip").value.trim();

    if(!zip){

        alert("Enter ZIP / Postcode");
        return;

    }

    // normalize input
    zip = zip.toUpperCase().replace(/\s+/g,'');

    let phone, address;

    // ================= GET UNUSED PROFILE =================

    const availableProfiles = profiles.filter(p =>
        !usedProfiles.includes(p.email)
    );

    // no profiles left
    if(availableProfiles.length === 0){

        document.getElementById("zipResult").innerHTML =
        "❌ No profiles left";

        return;

    }

    // random unused profile
    const profile =
    availableProfiles[
        rand(0, availableProfiles.length - 1)
    ];

    const fullName = profile.name;
    const email = profile.email;

    // save used email
    usedProfiles.push(email);

    localStorage.setItem(
        "usedProfiles",
        JSON.stringify(usedProfiles)
    );

    // random phone
    phone = `(${rand(200,999)}) ${rand(100,999)}-${rand(1000,9999)}`;

    // ================= UK POSTCODE CHECK =================

    const ukRegex =
    /^[A-Z]{1,2}\d[A-Z\d]?\d[A-Z]{2}$/i;

    if(ukRegex.test(zip)){

        try{

            let ukRes =
            await fetch(`https://api.postcodes.io/postcodes/${zip}`);

            if(ukRes.ok){

                let ukData = await ukRes.json();

                if(ukData.status === 200){

                    let result = ukData.result;

                    let city =
                    result.admin_district || "London";

                    let country =
                    "United Kingdom";

                    let lat =
                    result.latitude;

                    let lng =
                    result.longitude;

                    address =
                    `${zip}, ${city}, UK`;

                    document.getElementById("zipResult").innerHTML = `

<div onclick="copyText(this)">
<span class="label">Country Code:</span> UK
</div>

<div onclick="copyText(this)">
<span class="label">Country:</span> ${country}
</div>

<div onclick="copyText(this)">
<span class="label">ZIP:</span> ${zip}
</div>

</div>

<span class="label">State:</span> England
</div>

<div onclick="copyText(this)">
<span class="label">Latitude:</span> ${lat}
</div>

<span class="label">Longitude:</span> ${lng}
</div>

<div onclick="copyText(this)">
<span class="label">Name:</span> ${fullName}
</div>

<div onclick="copyText(this)">
<span class="label">Email:</span> ${email}
</div>

<div onclick="copyText(this)">
<span class="label">Phone:</span> ${phone}
</div>

<div onclick="copyText(this)">
<span class="label">Address:</span> ${address}
</div>

<div style="margin-top:10px;">
<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">
Open Exact Google Map Location 
</a>
</div>

`;

                    return;

                }

            }

        }catch(e){

            console.log(e);

        }

    }

    // ================= GLOBAL ZIP FALLBACK =================

    const countries = [
        "us",
        "ca",
        "in",
        "de",
        "fr",
        "au",
        "bd"
    ];

    let data = null;
    let usedCountry = null;

    for(let c of countries){

        try{

            let res =
            await fetch(`https://api.zippopotam.us/${c}/${zip}`);

            if(res.ok){

                let json = await res.json();

                if(json?.places?.length > 0){

                    data = json;
                    usedCountry = c.toUpperCase();

                    break;

                }

            }

        }catch(e){

            console.log(e);

        }

    }

    // ================= NO MATCH =================

    if(!data){

        document.getElementById("zipResult").innerHTML =
        "❌ No valid postcode found in supported databases";

        return;

    }

    let place = data.places[0];

    let city =
    place["place name"] || "Unknown";

    let state =
    place["state abbreviation"] ||
    place["state"] ||
    "Unknown";

    let country =
    data.country;

    let lat =
    place["latitude"];

    let lng =
    place["longitude"];

const street = generateStreet();

address =
`${street}, ${city}, ${state}, ${zip}`;

    // ================= OUTPUT =================

    document.getElementById("zipResult").innerHTML = `

<div onclick="copyText(this)">
<span class="label">Country Code:</span> ${usedCountry}
</div>

</div>

</div>

</div>

<div onclick="copyText(this)">
<span class="label">State:</span> ${state}
</div>

<div onclick="copyText(this)">
<span class="label">Latitude:</span> ${lat}
</div>

<div onclick="copyText(this)">
<span class="label">Longitude:</span> ${lng}
</div>

<div onclick="copyText(this)">
<span class="label">Name:</span> ${fullName}
</div>

<div onclick="copyText(this)">
<span class="label">Email:</span> ${email}
</div>

<span class="label">Phone:</span> ${phone}
</div>

<span class="label">Address:</span> ${address}
</div>

<div style="margin-top:10px;">
<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">
Open Exact Location in Google MAP
</a>
</div>

}
