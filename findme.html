<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Access Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .wrapper {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .profile-section {
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .main-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #818cf8;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.4);
            margin-bottom: 15px;
        }

        h1 { font-size: 1.4rem; letter-spacing: -0.5px; margin-bottom: 5px; }
        p { font-size: 0.9rem; color: #a5b4fc; margin-bottom: 20px; }

        .links-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Animated gradient border on hover/active */
        .glass-card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-premium {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border: none;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        footer {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="profile-section">
        <!-- Professional, high-quality image placeholder -->
        <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=300" alt="Featured" class="main-img">
        <h1>Discover Premium Offers</h1>
        <p><span class="status-dot"></span> Online & Verified</p>
    </div>

    <div class="links-area">
        <a href="YOUR_LINK_HERE" class="glass-card btn-premium">
            Unlock Exclusive Content
        </a>

        <a href="YOUR_LINK_HERE" class="glass-card">
            Private Member Access
        </a>

        <a href="YOUR_LINK_HERE" class="glass-card">
            View Today's Top Picks
        </a>
    </div>

    <footer>
        Secure Connection Verified <br>
        &copy; 2026 Elite Digital Solutions
    </footer>
</div>

</body>
</html>
