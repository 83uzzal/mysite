<style>
:root{
    --bg:#0d1117;
    --card:#161b22;
    --blue:#3fb1e3;
    --text:#c9d1d9;
    --border:#30363d;
    --green:#238636;
    --purple:#8b5cf6;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY (leave space for right panel) */
body{
    background-color:var(--bg);
    color:var(--text);
    font-family:'Segoe UI', sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:8px;
    gap:12px;
    min-height:100vh;
}

/* MAIN BOX (LEFT PANEL) */
.container{
    background-color:var(--card);
    width:100%;
    max-width:380px;   /* very compact */
    border-radius:6px;
    border:1px solid var(--border);
    padding:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* HEADER */
.header{
    text-align:center;
    color:var(--blue);
    font-size:13px;
    font-weight:700;
    margin-bottom:8px;
    text-transform:uppercase;
    border-bottom:1px solid var(--border);
    padding-bottom:4px;
    letter-spacing:0.4px;
}

/* LABEL */
label{
    display:block;
    margin-bottom:4px;
    font-size:11px;
    color:var(--blue);
    font-weight:600;
}

/* INPUTS */
select, button{
    width:100%;
    padding:6px;
    margin-bottom:8px;
    border-radius:5px;
    outline:none;
    font-size:11px;
    background-color:var(--bg);
    color:#fff;
    border:1px solid var(--border);
}

select{ cursor:pointer; }

button{
    cursor:pointer;
    transition:0.2s;
}

/* BUTTONS */
.btn-gen{
    background-color:var(--blue);
    color:#000;
    font-weight:700;
    border:none;
}

.btn-gen:hover{ opacity:0.85; }

.btn-copy{
    background-color:var(--green);
    border:none;
    margin-top:8px;
    font-weight:700;
    color:#fff;
}

.btn-copy:hover{ opacity:0.9; }

/* OUTPUT BOX */
.details-box{
    background-color:var(--bg);
    border:1px solid var(--border);
    border-radius:5px;
    padding:6px;
    display:none;
    margin-top:6px;
}

/* ROW */
.row{
    display:flex;
    gap:4px;
    margin-bottom:2px;
    font-size:10px;
    border-bottom:1px solid #1f242c;
    padding-bottom:2px;
    line-height:1.1;
}

.key{
    color:var(--blue);
    font-weight:700;
    min-width:120px;
}

.val{
    color:#fff;
    word-break:break-word;
}

/* UA OUTPUT */
.ua-output{
    background-color:#090c10;
    border:1px dotted var(--blue);
    padding:6px;
    border-radius:5px;
    margin-top:8px;
    font-family:monospace;
    color:var(--purple);
    font-size:10px;
    line-height:1.3;
    word-break:break-all;
}

/* RIGHT SIDE EMPTY PANEL (READY SPACE) */
.right-panel{
    width:100%;
    max-width:380px;
    min-height:100%;
    background:transparent;
}

/* MOBILE */
@media(max-width:800px){
    body{
        flex-direction:column;
        align-items:center;
    }
    .right-panel{
        display:none;
    }
}
</style>

        ["WebGL Vendor", d.vendor],
        ["WebGL Renderer", d.renderer],
        ["Canvas Fingerprint", "Per-Session Canvas Salt Noise (Natural Rendering)"],
        ["Language Locale", "en-US"],
        ["System Timezone", "America/New_York"]
    ];

    let html = "";
    infoFields.forEach(f => {
        html += `
<div class="row" onclick="copyRow(this)">
    <span class="key">${f[0]}:</span>
    <span class="val">${f[1]}</span>
</div>`;
    });

    document.getElementById('infoRows').innerHTML = html;
    document.getElementById('uaOutput').innerText = ua;
    document.getElementById('detailsArea').style.display = 'block';
}

// ================= COPY INTERACTION =================
function copyWindowsUA(){
    const uaText = document.getElementById('uaOutput').innerText;
    if(!uaText) return;
    
    navigator.clipboard.writeText(uaText).then(() => {
        const copyBtn = document.getElementById('copyBtn');
        copyBtn.innerText = "✓ Copied!";
        copyBtn.style.backgroundColor = "#17a2b8";
        setTimeout(() => {
            copyBtn.innerText = "Copy User Agent";
            copyBtn.style.backgroundColor = "var(--green)";
        }, 1500);
    });
}

function copyRow(el){
    const val = el.querySelector('.val').innerText;

    navigator.clipboard.writeText(val).then(() => {
        el.style.backgroundColor = "#1f2a37";

        setTimeout(() => {
            el.style.backgroundColor = "";
        }, 300);
    });
}

</script>
