// ================= INIT =================
const deviceSelect = document.getElementById("device");

devices.forEach((d,i)=>{
    let opt = document.createElement("option");
    opt.value = i;

    deviceSelect.appendChild(opt);
});

// ================= RANDOM =================
function rand(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

// ================= UA GENERATION =================
function generateUA(){

    let d = devices[deviceSelect.value];
    let browser = document.getElementById("browser").value;

    let iosVer = ["17_2","17_3","17_4","17_5"][rand(0,3)];
    let platform = d.platform.replace(/17_2|17_3|17_4|17_5|16_6|15_7/g, iosVer);

    let ua = "";

    if(platform.includes("Android")){

        let androidVer = rand(1,100) <= 80 ? "14" : "13";
        platform = platform.replace(/Android \d+/g, "Android " + androidVer);

        ua = `Mozilla/5.0 (${platform}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.${rand(1000,6000)}.${rand(10,200)} Mobile Safari/537.36`;
    }
    else{

        ua = `Mozilla/5.0 (${platform}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${iosVer.replace("_",".")} Mobile/15E148 Safari/604.1`;
    }

    document.getElementById("result").innerHTML = `
<div><span class="label">Model:</span> ${d.name}</div>
<div><span class="label">Brand:</span> ${d.brand}</div>
<div><span class="label">Chipset:</span> ${d.chipset}</div>
<div><span class="label">RAM:</span> ${d.ram}</div>
<div><span class="label">Storage:</span> ${d.storage}</div>
<div><span class="label">Display:</span> ${d.display}</div>
<div><span class="label">Camera:</span> ${d.camera}</div>
<div><span class="label">Battery:</span> ${d.battery}</div>
<div><span class="label">OS:</span> ${d.os}</div>

<div style="margin-top:10px;"><span class="label">User Agent:</span></div>
<div>${ua}</div>

<button class="copyBtn" onclick="copyUA()">Copy</button>
`;

    window.currentUA = ua;
}

// ================= COPY =================
function copyUA(){
    navigator.clipboard.writeText(window.currentUA);
    alert("Copied!");
}
