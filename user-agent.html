<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USA Mobile UA Generator</title>

<style>

body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.box{
    width:950px;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}

h2{
    text-align:center;
    color:#38bdf8;
}

select, button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:20px;
    border-radius:10px;
    line-height:1.8;
    word-break:break-word;
}

.label{
    color:#38bdf8;
    font-weight:bold;
}

.copyBtn{
    background:#22c55e;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="box">

<h2>📱 USA MOBILE USER-AGENT GENERATOR</h2>

<select id="device"></select>

<select id="browser">
    <option value="chrome">Chrome</option>
    <option value="safari">Safari</option>
    <option value="firefox">Firefox</option>
</select>

<button onclick="generateUA()">Generate User Agent</button>

<div class="result" id="result"></div>

</div>

<script>

// ---------------- DEVICES ----------------
const devices = [

{
    name:"Apple iPhone 15",
    brand:"Apple",
    chipset:"Apple A16 Bionic",
    ram:"6 GB",
    storage:"128GB / 256GB / 512GB",
    display:"6.1-inch Super Retina XDR OLED",
    resolution:"1179 x 2556 pixels",
    ppi:"460 PPI",
    camera:"48MP + 12MP",
    battery:"3349 mAh",
    os:"iOS 17",
    platform:"iPhone; CPU iPhone OS 17_2 like Mac OS X"
},

{
    name:"Apple iPhone 15 Pro Max",
    brand:"Apple",
    chipset:"Apple A17 Pro",
    ram:"8 GB",
    storage:"256GB / 512GB / 1TB",
    display:"6.7-inch Super Retina XDR OLED 120Hz",
    resolution:"1290 x 2796 pixels",
    ppi:"460 PPI",
    camera:"48MP + 12MP + 12MP",
    battery:"4441 mAh",
    os:"iOS 17",
    platform:"iPhone; CPU iPhone OS 17_2 like Mac OS X"
},

{
    name:"Samsung Galaxy S24 Ultra",
    brand:"Samsung",
    chipset:"Snapdragon 8 Gen 3",
    ram:"12 GB",
    storage:"256GB / 512GB / 1TB",
    display:"6.8-inch AMOLED 120Hz",
    resolution:"1440 x 3120 pixels",
    ppi:"505 PPI",
    camera:"200MP + 50MP + 12MP + 10MP",
    battery:"5000 mAh",
    os:"Android 14",
    platform:"Linux; Android 14; SM-S928B"
},

{
    name:"Google Pixel 8 Pro",
    brand:"Google",
    chipset:"Google Tensor G3",
    ram:"12 GB",
    storage:"128GB / 256GB / 512GB",
    display:"6.7-inch LTPO OLED 120Hz",
    resolution:"1344 x 2992 pixels",
    ppi:"489 PPI",
    camera:"50MP + 48MP + 48MP",
    battery:"5050 mAh",
    os:"Android 14",
    platform:"Linux; Android 14; Pixel 8 Pro"
},

{
    name:"OnePlus 12",
    brand:"OnePlus",
    chipset:"Snapdragon 8 Gen 3",
    ram:"16 GB",
    storage:"256GB / 512GB",
    display:"6.82-inch AMOLED 120Hz",
    resolution:"1440 x 3168 pixels",
    ppi:"510 PPI",
    camera:"50MP + 64MP + 48MP",
    battery:"5400 mAh",
    os:"Android 14",
    platform:"Linux; Android 14; CPH2581"
}

];


// ---------------- LOAD DEVICES ----------------
let deviceSelect = document.getElementById("device");

devices.forEach((d,i)=>{

    let opt = document.createElement("option");

    opt.value = i;

    opt.textContent = d.name;

    deviceSelect.appendChild(opt);

});


// ---------------- RANDOM ----------------
function rand(n){

    return Math.floor(Math.random()*n);

}


// ---------------- GENERATE ----------------
function generateUA(){

    let d = devices[deviceSelect.value];

    let browser = document.getElementById("browser").value;

    let ua = "";


    if(browser === "chrome"){

        let ver = `122.0.${rand(5000)}.${rand(200)}`;

        ua =
`Mozilla/5.0 (${d.platform}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${ver} Mobile Safari/537.36`;

    }

    else if(browser === "safari"){

        let ver = `17.${rand(5)}`;

        ua =
`Mozilla/5.0 (${d.platform}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${ver} Mobile/15E148 Safari/604.1`;

    }

    else if(browser === "firefox"){

        ua =
`Mozilla/5.0 (${d.platform}; rv:122.0) Gecko/20100101 Firefox/122.0`;

    }


    document.getElementById("result").innerHTML = `

        <div><span class="label">Model:</span> ${d.name}</div>

        <div><span class="label">Brand:</span> ${d.brand}</div>

        <div><span class="label">Chipset:</span> ${d.chipset}</div>

        <div><span class="label">RAM:</span> ${d.ram}</div>

        <div><span class="label">Storage:</span> ${d.storage}</div>

        <div><span class="label">Display:</span> ${d.display}</div>

        <div><span class="label">Resolution:</span> ${d.resolution}</div>

        <div><span class="label">Pixel Density:</span> ${d.ppi}</div>

        <div><span class="label">Camera:</span> ${d.camera}</div>

        <div><span class="label">Battery:</span> ${d.battery}</div>

        <div><span class="label">OS:</span> ${d.os}</div>

        <div><span class="label">Browser:</span> ${browser}</div>

        <div style="margin-top:15px;">
            <span class="label">User Agent:</span>
        </div>

        <div id="uaText">${ua}</div>

        <button class="copyBtn" onclick="copyUA()">Copy User Agent</button>

    `;

    window.currentUA = ua;

}


// ---------------- COPY ----------------
function copyUA(){

    navigator.clipboard.writeText(window.currentUA);

    alert("User-Agent copied!");

}

</script>

</body>
</html>
