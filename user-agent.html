<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USA Mobile UA Generator</title>

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
    padding:20px;
}

/* 🔽 box size ছোট করা হয়েছে */
.box{
    width:90%;
    max-width:800px;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

h2{
    text-align:center;
    color:#38bdf8;
}

select, button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:20px;
    border-radius:10px;
    line-height:1.8;
    word-break:break-word;
}

.label{
    color:#38bdf8;
    font-weight:bold;
}

.copyBtn{
    background:#22c55e;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="box">

<h2>📱 USA MOBILE USER AGENT GENERATOR</h2>

<select id="device"></select>

<select id="browser">
    <option value="chrome">Chrome</option>
    <option value="safari">Safari</option>
    <option value="firefox">Firefox</option>
</select>

<button onclick="generateUA()">Generate User Agent</button>

<div class="result" id="result">Select device and generate UA</div>

<!-- 🔽 COPY BUTTON ADDED -->
<button class="copyBtn" onclick="copyUA()">Copy User Agent</button>

</div>

<script>

platform:"Linux; Android 13; T671H"
}
];

// ================= INIT =================
const deviceSelect = document.getElementById("device");

devices.forEach((d,i)=>{
    let opt = document.createElement("option");
    opt.value = i;
    opt.textContent = d.name;
    deviceSelect.appendChild(opt);
});

// ================= RANDOM =================
function rand(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

// ================= GENERATE UA =================
function generateUA(){

    let d = devices[deviceSelect.value];
    let browser = document.getElementById("browser").value;

    let iosVer = ["17_2","17_3","17_4","17_5"][rand(0,3)];
    let safariVer = ["17.2","17.3","17.4","17.5"][rand(0,3)];

    let chromeVer = `122.0.${rand(1000,6000)}.${rand(10,200)}`;
    let firefoxVer = "122.0";

    let platform = d.platform
        .replace(/17_2|17_3|17_4|17_5/g, iosVer);

    let ua = "";

    if(browser === "chrome"){
        ua = `Mozilla/5.0 (${platform}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeVer} Mobile Safari/537.36`;
    }

    else if(browser === "safari"){
        ua = `Mozilla/5.0 (${platform}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${safariVer} Mobile/15E148 Safari/604.1`;
    }

    else if(browser === "firefox"){
        ua = `Mozilla/5.0 (${platform}; rv:${firefoxVer}) Gecko/20100101 Firefox/${firefoxVer}`;
    }

    document.getElementById("result").innerHTML = `
<div><span class="label">Model:</span> ${d.name}</div>
<div><span class="label">Brand:</span> ${d.brand}</div>
<div><span class="label">Chipset:</span> ${d.chipset}</div>
<div><span class="label">CPU Cores:</span> ${d.cores}</div>
<div><span class="label">RAM:</span> ${d.ram}</div>
<div><span class="label">Storage:</span> ${d.storage}</div>
<div><span class="label">Display:</span> ${d.display}</div>
<div><span class="label">Resolution:</span> ${d.resolution}</div>
<div><span class="label">Pixel Density:</span> ${d.ppi}</div>
<div><span class="label">Camera:</span> ${d.camera}</div>
<div><span class="label">Battery:</span> ${d.battery}</div>
<div><span class="label">OS:</span> ${d.os}</div>
<div><span class="label">Browser:</span> ${browser}</div>

<div style="margin-top:10px;"><span class="label">User Agent:</span></div>
<div>${ua}</div>
`;

    window.currentUA = ua;
}

// ================= COPY FUNCTION =================
function copyUA(){
    navigator.clipboard.writeText(window.currentUA);
    alert("User Agent Copied!");
}

</script>
