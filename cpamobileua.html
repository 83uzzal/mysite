<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced UA Generator + ZIP + IP Checker</title>

<style>

:root{
    --bg:#0d1117;
    --card:#161b22;
    --blue:#3fb1e3;
    --text:#c9d1d9;
    --border:#30363d;
    --green:#238636;
    --orange:#f59e0b;
}

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    overflow-x:hidden;
}

/* BODY */

body{
    background-color:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:6px;
    min-height:100vh;
}

/* WRAPPER */

.wrapper{
    width:100%;
    max-width:1200px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:6px;
}

/* BOX */

.container{
    background-color:var(--card);
    width:100%;
    border-radius:8px;
    border:1px solid var(--border);
    padding:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* HEADER */

.header{
    text-align:center;
    color:var(--blue);
    font-size:13px;
    font-weight:700;
    margin-bottom:8px;
    text-transform:uppercase;
    border-bottom:1px solid var(--border);
    padding-bottom:4px;
    letter-spacing:0.5px;
}

/* LABEL */

label{
    display:block;
    margin-bottom:4px;
    font-size:12px;
    color:var(--blue);
    font-weight:600;
}

/* INPUT */

select,
input,
button{
    width:100%;
    padding:4px 8px;
    margin-bottom:6px;
    border-radius:6px;
    outline:none;
    font-size:11px;
    background-color:var(--bg);
    color:#fff;
    border:1px solid var(--border);
}

select{
    cursor:pointer;
}

/* BUTTON */

button{
    cursor:pointer;
    transition:0.25s;
}

/* GENERATE BUTTON */

.btn-gen{
    background-color:var(--blue);
    color:#000;
    font-weight:700;
    border:none;
}

.btn-gen:hover{
    opacity:0.85;
}

/* COPY BUTTON */

.btn-copy{
    background-color:var(--green);
    border:none;
    margin-top:10px;
    font-weight:700;
    color:#fff;
}

.btn-copy:hover{
    opacity:0.9;
}

/* DETAILS */

.details-box{
    background-color:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
    display:none;
    margin-top:6px;
}

/* ROW */

.row{
    display:flex;
    justify-content:flex-start;
    align-items:flex-start;
    gap:5px;
    margin-bottom:2px;
    font-size:10px;
    border-bottom:1px solid #1f242c;
    padding-bottom:1px;
    line-height:1.3;
}
.row:hover {
    background-color: #1c2128;
}
/* KEY */

.key{
    color:var(--blue);
    font-weight:700;
    white-space:nowrap;
    min-width:75px;
}

/* VALUE */

.val{
    color:#fff;
    word-break:break-word;
}

/* UA OUTPUT */

.ua-output{
    background-color:#090c10;
    border:1px dotted var(--blue);
    padding:8px;
    border-radius:6px;
    margin-top:10px;
    word-break:break-all;
    font-family:monospace;
    color:var(--blue);
    font-size:10px;
    line-height:1.35;
    overflow-wrap:anywhere;
}

/* RESULT */

.result{
    margin-top:8px;
    background:#0f172a;
    padding:8px;
    border-radius:8px;
    line-height:1.45;
    word-break:break-word;
    border:1px solid #334155;
    font-size:10px;
}

/* LABEL */

.label{
    color:#38bdf8;
    font-weight:bold;
}

/* IP BUTTONS */

.ipBtns{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:10px;
}

.ipBtns a{
    background:var(--orange);
    color:black;
    text-align:center;
    padding:10px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    font-size:12px;
}

.ipBtns a:hover{
    opacity:.92;
}

a{
    color:#38bdf8;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

/* MOBILE */

@media(max-width:1100px){

    .wrapper{
        grid-template-columns:1fr;
    }

}

@media(max-width:480px){

    body{
        padding:4px;
    }

    .container{
        padding:10px;
        border-radius:8px;
    }

    .header{
        font-size:14px;
    }

    select,
    input,
    button{
        font-size:11px;
        padding:7px 8px;
    }

    .row{
        font-size:10px;
    }

    .ua-output{
        font-size:10px;
    }

    .result{
        font-size:10px;
    }
}

</style>
</head>

});

// ================= COPY UA =================

function copyUA(){

    const uaText = document.getElementById('uaOutput').innerText;

    navigator.clipboard.writeText(uaText).then(() => {

        const copyBtn = document.getElementById('copyBtn');

        copyBtn.innerText = "✓ Copied!";

        copyBtn.style.backgroundColor = "#17a2b8";

        setTimeout(() => {

            copyBtn.innerText = "Copy User Agent";

            copyBtn.style.backgroundColor = "var(--green)";

        },1500);

    });

}

// ===== RANDOM HELPER =====

function rand(min,max){

    return Math.floor(Math.random() * (max - min + 1)) + min;

}

function pick(arr){

    return arr[rand(0, arr.length - 1)];

}

// ===== GENERATE PROFILE =====

async function generateProfile(){

    let zip = document.getElementById("zip").value.trim();

    if(!zip){

        alert("Enter ZIP Code");
        return;

    }

    try{

        // API CALL
        let res = await fetch(zipAPI + zip);

        if(!res.ok){

            throw new Error("Invalid ZIP");

        }

        let data = await res.json();

        let place = data.places[0];

        let city = place["place name"];

        let state = place["state abbreviation"];

        // RANDOM USER
        let first = pick(firstNames);

        let last = pick(lastNames);

        // RANDOM YEAR
        let year = rand(1988, 2005);

        // RANDOM EMAIL
        let emailProviders = [
            "gmail.com",
            "outlook.com",
            "yahoo.com",
            "hotmail.com"
        ];

        let email =
            `${first.toLowerCase()}.${last.toLowerCase()}${rand(10,999)}@${pick(emailProviders)}`;

        // US STYLE PHONE
        let area = rand(201,989);

        let phone =
            `(${area}) ${rand(200,999)}-${rand(1000,9999)}`;

        // ADDRESS
        let address =
            `${rand(100,9999)} ${pick(streets)}, ${city}, ${state} ${zip}`;

        // MAP LINK
        let mapURL =
            `https://www.google.com/maps/search/${encodeURIComponent(zip)}`;

        // OUTPUT
        document.getElementById("zipResult").innerHTML = `

<div><span class="label">ZIP:</span> ${zip}</div>

<div><span class="label">City:</span> ${city}</div>

<div><span class="label">State:</span> ${state}</div>

<div><span class="label">Full Name:</span> ${first} ${last}</div>

<div><span class="label">Birth Year:</span> ${year}</div>

<div><span class="label">Email:</span> ${email}</div>

<div><span class="label">Phone:</span> ${phone}</div>

<div><span class="label">Address:</span> ${address}</div>

<div>
<span class="label">Map:</span>
<a href="${mapURL}" target="_blank">
Open Location
</a>
</div>

`;

    }

    catch(err){

        console.error(err);

        document.getElementById("zipResult").innerHTML = `
<div style="color:red;">
❌ Invalid ZIP Code or API Error
</div>
`;

    }

}

// ================= COPY INTERACTION =================
function copyWindowsUA(){
    const uaText = document.getElementById('uaOutput').innerText;
    if(!uaText) return;
    
    navigator.clipboard.writeText(uaText).then(() => {
        const copyBtn = document.getElementById('copyBtn');
        copyBtn.innerText = "✓ Copied!";
        copyBtn.style.backgroundColor = "#17a2b8";
        setTimeout(() => {
            copyBtn.innerText = "Copy User Agent";
            copyBtn.style.backgroundColor = "var(--green)";
        }, 1500);
    });
}

function copyRow(el){
    const val = el.querySelector('.val').innerText;

    navigator.clipboard.writeText(val).then(() => {
        el.style.backgroundColor = "#1f2a37";

        setTimeout(() => {
            el.style.backgroundColor = "";
        }, 300);
    });
}
