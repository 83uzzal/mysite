<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced UA Generator + ZIP + IP Checker</title>

<style>

:root{
    --bg:#0d1117;
    --card:#161b22;
    --blue:#3fb1e3;
    --text:#c9d1d9;
    --border:#30363d;
    --green:#238636;
    --orange:#f59e0b;
}

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    overflow-x:hidden;
}

/* BODY */

body{
    background-color:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:6px;
    min-height:100vh;
}

/* WRAPPER */

.wrapper{
    width:100%;
    max-width:1200px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:6px;
}

/* BOX */

.container{
    background-color:var(--card);
    width:100%;
    border-radius:8px;
    border:1px solid var(--border);
    padding:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* HEADER */

.header{
    text-align:center;
    color:var(--blue);
    font-size:13px;
    font-weight:700;
    margin-bottom:8px;
    text-transform:uppercase;
    border-bottom:1px solid var(--border);
    padding-bottom:4px;
    letter-spacing:0.5px;
}

/* LABEL */

label{
    display:block;
    margin-bottom:4px;
    font-size:12px;
    color:var(--blue);
    font-weight:600;
}

/* INPUT */

select,
input,
button{
    width:100%;
    padding:4px 8px;
    margin-bottom:6px;
    border-radius:6px;
    outline:none;
    font-size:11px;
    background-color:var(--bg);
    color:#fff;
    border:1px solid var(--border);
}

select{
    cursor:pointer;
}

/* BUTTON */

button{
    cursor:pointer;
    transition:0.25s;
}

/* GENERATE BUTTON */

.btn-gen{
    background-color:var(--blue);
    color:#000;
    font-weight:700;
    border:none;
}

.btn-gen:hover{
    opacity:0.85;
}

/* COPY BUTTON */

.btn-copy{
    background-color:var(--green);
    border:none;
    margin-top:10px;
    font-weight:700;
    color:#fff;
}

.btn-copy:hover{
    opacity:0.9;
}

/* DETAILS */

.details-box{
    background-color:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
    display:none;
    margin-top:6px;
}

/* ROW */

.row{
    display:flex;
    justify-content:flex-start;
    align-items:flex-start;
    gap:5px;
    margin-bottom:2px;
    font-size:10px;
    border-bottom:1px solid #1f242c;
    padding-bottom:1px;
    line-height:1.3;
}
.row:hover {
    background-color: #1c2128;
}
/* KEY */

.key{
    color:var(--blue);
    font-weight:700;
    white-space:nowrap;
    min-width:75px;
}

/* VALUE */

.val{
    color:#fff;
    word-break:break-word;
}

/* UA OUTPUT */

.ua-output{
    background-color:#090c10;
    border:1px dotted var(--blue);
    padding:8px;
    border-radius:6px;
    margin-top:10px;
    word-break:break-all;
    font-family:monospace;
    color:var(--blue);
    font-size:10px;
    line-height:1.35;
    overflow-wrap:anywhere;
}

/* RESULT */

.result{
    margin-top:8px;
    background:#0f172a;
    padding:8px;
    border-radius:8px;
    line-height:1.45;
    word-break:break-word;
    border:1px solid #334155;
    font-size:10px;
}

/* LABEL */

.label{
    color:#38bdf8;
    font-weight:bold;
}

/* IP BUTTONS */

.ipBtns{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:10px;
}

.ipBtns a{
    background:var(--orange);
    color:black;
    text-align:center;
    padding:10px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    font-size:12px;
}

.ipBtns a:hover{
    opacity:.92;
}

a{
    color:#38bdf8;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

/* MOBILE */

@media(max-width:1100px){

    .wrapper{
        grid-template-columns:1fr;
    }

}

@media(max-width:480px){

    body{
        padding:4px;
    }

    .container{
        padding:10px;
        border-radius:8px;
    }

    .header{
        font-size:14px;
    }

    select,
    input,
    button{
        font-size:11px;
        padding:7px 8px;
    }

    .row{
        font-size:10px;
    }

    .ua-output{
        font-size:10px;
    }

    .result{
        font-size:10px;
    }
}

</style>
</head>

// ================= GENERATE UA =================

function generateUA(){

    const d = devices[dSelect.value];

    const b = document.getElementById('browserSelect').value;

    const ver = browserVers[b][Math.floor(Math.random()*browserVers[b].length)];

    let ua = "";

    if(d.brand === "Apple"){

        let rawOS = d.os.match(/\d+/g);

        let iosMainVersion = rawOS ? rawOS[rawOS.length - 1] : "18";

        let iosFormatted = `${iosMainVersion}_4`;

        let webkitVer = "605.1.15";

        if(b === "Safari"){

            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosFormatted} like Mac OS X) AppleWebKit/${webkitVer} (KHTML, like Gecko) Version/${iosMainVersion}.4 Mobile/15E148 Safari/${webkitVer}`;

        }

        else if(b === "Chrome"){

            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosFormatted} like Mac OS X) AppleWebKit/${webkitVer} (KHTML, like Gecko) CriOS/${ver} Mobile/15E148 Safari/${webkitVer}`;

        }

        else if(b === "Edge"){

            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosFormatted} like Mac OS X) AppleWebKit/${webkitVer} (KHTML, like Gecko) EdgiOS/${ver} Mobile/15E148 Safari/${webkitVer}`;

        }

        else{

            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosFormatted} like Mac OS X) AppleWebKit/${webkitVer} (KHTML, like Gecko) FxiOS/${ver} Mobile/15E148 Safari/${webkitVer}`;

        }

    }

    else{

        let rawAnd = d.os.match(/\d+/);

        let andVer = rawAnd ? rawAnd[0] : "15";

        if(b === "Firefox"){

            ua = `Mozilla/5.0 (Android ${andVer}; Mobile; rv:${ver}) Gecko/${ver} Firefox/${ver}`;

        }

        else if(b === "Edge"){

            ua = `Mozilla/5.0 (Linux; Android ${andVer}; ${d.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${ver.split('.')[0]}.0.0.0 Mobile Safari/537.36 EdgA/${ver}`;

        }

        else if(b === "Safari"){

            ua = `Mozilla/5.0 (Linux; Android ${andVer}; ${d.model}) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Mobile Safari/537.36`;

        }

else {
    // 🌟 এখানে ডাইনামিক অ্যান্ড্রয়েড ভার্সন এবং মডেল সেট করা হলো
    ua = `Mozilla/5.0 (Linux; Android ${andVer}; ${d.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${ver} Mobile Safari/537.36`;
}

    } // এই ব্র্যাকেটটি হলো if-else এর শেষ সীমা

            let match = d.webgl_vendor.match(/\(([^)]+)\)/);
            if (match && match[1]) {
                finalVendor = "Google Inc. (" + match[1] + ")";
            } else {
                finalVendor = d.webgl_vendor; 
            }
        }
    }

    const infoFields = [

        ["Model:", d.brand + " " + d.model],
        ["Chipset:", d.chipset],
        ["CPU:", d.cpu],

		["Display:", d.display],
        ["Viewport:", d.viewport],
        ["Timezone:", "America/New_York"]

    ];

    let html = "";

infoFields.forEach(f => {
    // এখানে onclick="copyRow(this)" এবং title যুক্ত করা হয়েছে
    html += `<div class="row" onclick="copyRow(this)" title="Click to copy value" style="cursor: pointer;"><span class="key">${f[0]}</span><span class="val">${f[1]}</span></div>`;
});

    document.getElementById('infoRows').innerHTML = html;

    document.getElementById('uaOutput').innerText = ua;

    document.getElementById('detailsArea').style.display = 'block';

}

// ================= COPY UA =================

function copyUA(){

    const uaText = document.getElementById('uaOutput').innerText;

    navigator.clipboard.writeText(uaText).then(() => {

        const copyBtn = document.getElementById('copyBtn');

        copyBtn.innerText = "✓ Copied!";

        copyBtn.style.backgroundColor = "#17a2b8";

        setTimeout(() => {

            copyBtn.innerText = "Copy User Agent";

            copyBtn.style.backgroundColor = "var(--green)";

        },1500);

    });

}

function rand(min,max){

    return Math.floor(Math.random()*(max-min+1))+min;

];

    let zip = document.getElementById("zip").value.trim();

        alert("Enter ZIP Code");

        return;

    }

        let res = await fetch(zipAPI + zip);

        if(!res.ok){

            throw new Error();

        }

        let data = await res.json();

        let place = data.places[0];

        let city = place["place name"];

        let state = place["state abbreviation"];

        let first = firstNames[rand(0,firstNames.length-1)];

        let last = lastNames[rand(0,lastNames.length-1)];

let domains = [
  "gmail.com","gmail.com","gmail.com","gmail.com","gmail.com","gmail.com",
  "yahoo.com","yahoo.com",
  "hotmail.com",
  "outlook.com"
];

for(let i = 0; i < 10; i++){

    let f = first;   // ✅ FIXED
    let l = last;    // ✅ FIXED
    let domain = domains[i];

    let year = rand(1991, 1999);

    let email =
      `${f.toLowerCase()}.${l.toLowerCase()}${year}@${domain}`;

    emails.push(email);
}

        let phone = `(${rand(200,999)}) ${rand(100,999)}-${rand(1000,9999)}`;

        let address = `${rand(100,9999)} ${streets[rand(0,streets.length-1)]}, ${city}, ${state}, ${zip}`;



document.getElementById("zipResult").innerHTML = `
<div id="zipCopyArea">

`;


    }

}

// ================= COPY INTERACTION =================
function copyWindowsUA(){
    const uaText = document.getElementById('uaOutput').innerText;
    if(!uaText) return;
    
    navigator.clipboard.writeText(uaText).then(() => {
        const copyBtn = document.getElementById('copyBtn');
        copyBtn.innerText = "✓ Copied!";
        copyBtn.style.backgroundColor = "#17a2b8";
        setTimeout(() => {
            copyBtn.innerText = "Copy User Agent";
            copyBtn.style.backgroundColor = "var(--green)";
        }, 1500);
    });
}

function copyRow(el){
    const val = el.querySelector('.val').innerText;

    navigator.clipboard.writeText(val).then(() => {
        el.style.backgroundColor = "#1f2a37";

        setTimeout(() => {
            el.style.backgroundColor = "";
        }, 300);
    });
}

function copyZipProfile(){

    const text = document.getElementById("zipCopyArea").innerText;

    navigator.clipboard.writeText(text).then(() => {

        const btn = event.target;

        btn.innerText = "✓ Copied!";
        btn.style.background = "#17a2b8";

        setTimeout(() => {
            btn.innerText = "Copy ZIP Profile";
            btn.style.background = "var(--green)";
        }, 1500);

    });

}
