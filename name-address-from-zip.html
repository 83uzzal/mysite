<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>ZIP → Realistic USA Profile (No Mismatch)</title>



<style>

body{

    margin:0;

    background:#0f172a;

    font-family:Arial;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    color:white;

}



.box{

    width:520px;

    background:#1e293b;

    padding:25px;

    border-radius:12px;

}



h2{

    text-align:center;

    color:#38bdf8;

}



input{

    width:100%;

    padding:12px;

    margin-top:10px;

    border:none;

    border-radius:8px;

    font-size:16px;

}



button{

    width:100%;

    padding:12px;

    margin-top:15px;

    background:#38bdf8;

    border:none;

    border-radius:8px;

    font-weight:bold;

    cursor:pointer;

}



.result{

    margin-top:20px;

    background:#0f172a;

    padding:15px;

    border-radius:10px;

    line-height:1.8;

}



.label{ color:#38bdf8; font-weight:bold; }



a{ color:#38bdf8; }

</style>

</head>



<body>



<div class="box">



<h2>📍 ZIP → USA PROFILE SYSTEM</h2>



<input id="zip" placeholder="Enter ZIP (e.g. 10001)">



<button onclick="generate()">Generate</button>



<div class="result" id="result"></div>



</div>



<script>



// ---------------- API ----------------

const zipAPI = "https://api.zippopotam.us/us/";



// ---------------- DATA ----------------

const firstNames = [

"James","John","Robert","Michael","William",

"David","Joseph","Thomas","Charles","Christopher",

"Jessica","Emily","Sarah","Ashley","Emma","Olivia"

];



const lastNames = [

"Smith","Johnson","Brown","Williams","Jones",

"Miller","Davis","Wilson","Taylor","Anderson"

];



const streets = [

"Main St","Oak Ave","Lake View Dr","Sunset Blvd",

"Hill Rd","River St","Park Ave","Broadway"

];



// AREA CODE DATA

const areaCodes = {

    "NY": ["212","315","332","347","516","518","585","607","631","646","680","716","718","838","845","914","917","929"],

    "CA": ["209","213","279","310","323","341","408","415","424","442","510","530","559","562","619","626","650","657","661","669","707","714","747","760","805","818","820","831","840","858","909","916","925","949"],

    "TX": ["210","214","254","281","325","346","361","409","430","432","469","512","682","713","726","737","806","817","830","832","903","915","936","940","956","972","979"],

    "FL": ["239","305","321","352","386","407","561","727","754","772","786","813","850","863","904","941","954"],

    "IL": ["217","224","309","312","331","447","464","618","630","708","773","779","815","847","872"],

    "PA": ["215","223","267","272","412","445","484","570","610","717","724","814","878"],

    "OH": ["216","220","234","283","326","330","380","419","440","513","567","614","740","937"],

    "GA": ["229","404","470","478","678","706","762","770","912"],

    "NC": ["252","336","704","743","828","910","919","980","984"],

    "MI": ["231","248","269","313","517","586","616","679","734","810","906","947","989"]

};



// ---------------- MAIN ----------------



async function generate(){



    let zip = document.getElementById("zip").value;



    try{



        // REAL ZIP DATA

        let res = await fetch(zipAPI + zip);

        let data = await res.json();



        let place = data.places[0];

        let city = place["place name"];

        let state = place["state abbreviation"];



        // stable seed

        let seed = 0;

        for(let i=0;i<zip.length;i++){

            seed += zip.charCodeAt(i);

        }



        let first = firstNames[seed % firstNames.length];

        let last = lastNames[(seed * 2) % lastNames.length];



        // random year 1991 - 2000

        let year = Math.floor(Math.random() * 10) + 1991;



        // email

        let email = `${first.toLowerCase()}${last.toLowerCase()}${year}@gmail.com`;



        // dynamic area code by state

        let stateCodes = areaCodes[state] || ["202"];

        let areaCode = stateCodes[Math.floor(Math.random() * stateCodes.length)];



        // phone

        let phone = `(${areaCode}) ${Math.floor(Math.random()*900)+100}-${Math.floor(Math.random()*9000)+1000}`;



        // random street + house (ONLY DISPLAY)

        let street = streets[Math.floor(Math.random()*streets.length)];

        let house = Math.floor(Math.random()*9000)+100;



        let displayAddress = `${house} ${street}, ${city}, ${state}, ${zip}, USA`;



        // real map (NO MISMATCH)

        let geo = await fetch(

            `https://nominatim.openstreetmap.org/search?format=json&q=${zip},USA`

        );



        let geoData = await geo.json();

        let lat = geoData[0].lat;

        let lon = geoData[0].lon;



        let mapLink = `https://www.google.com/maps?q=${lat},${lon}`;



        // OUTPUT

        document.getElementById("result").innerHTML = `



            <div><span class="label">ZIP:</span> ${zip}</div>



            <div><span class="label">City:</span> ${city}</div>



            <div><span class="label">State:</span> ${state}</div>



            <div><span class="label">Name:</span> ${first} ${last}</div>



            <div><span class="label">Email:</span> ${email}</div>



            <div><span class="label">Phone:</span> ${phone}</div>



            <div><span class="label">Address:</span> ${displayAddress}</div>



            <div><span class="label">Map:</span>

                <a href="${mapLink}" target="_blank">Open Location</a>

            </div>



        `;



    }catch(err){

        document.getElementById("result").innerHTML =

        "❌ Invalid ZIP or API error";

    }

}



</script>



</body>

</html>
