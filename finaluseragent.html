<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced UA & Environment Generator</title>

<style>
:root{
    --bg:#0d1117;
    --card:#161b22;
    --blue:#3fb1e3;
    --text:#c9d1d9;
    --border:#30363d;
    --green:#238636;
    --orange:#f59e0b;
    --purple:#8b5cf6;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    overflow-x:hidden;
}

/* BODY */
body{
    background-color:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:12px;
    min-height:100vh;
}

/* WRAPPER */
.wrapper{
    width:100%;
    max-width:1000px;
    display:grid;
    grid-template-columns:1fr 1fr; /* দুই প্যানেল লেআউট */
    gap:12px;
}

/* BOX */
.container{
    background-color:var(--card);
    width:100%;
    border-radius:8px;
    border:1px solid var(--border);
    padding:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* HEADER */
.header{
    text-align:center;
    color:var(--blue);
    font-size:13px;
    font-weight:700;
    margin-bottom:12px;
    text-transform:uppercase;
    border-bottom:1px solid var(--border);
    padding-bottom:6px;
    letter-spacing:0.5px;
}

/* LABEL */
label{
    display:block;
    margin-bottom:4px;
    font-size:11px;
    color:var(--blue);
    font-weight:600;
}

/* INPUT */
select,
button{
    width:100%;
    padding:6px 8px;
    margin-bottom:8px;
    border-radius:6px;
    outline:none;
    font-size:11px;
    background-color:var(--bg);
    color:#fff;
    border:1px solid var(--border);
}

select{
    cursor:pointer;
}

/* BUTTON */
button{
    cursor:pointer;
    transition:0.2s;
}

/* GENERATE BUTTON */
.btn-gen{
    background-color:var(--blue);
    color:#000;
    font-weight:700;
    border:none;
}

.btn-gen:hover{
    opacity:0.85;
}

/* COPY BUTTON */
.btn-copy{
    background-color:var(--green);
    border:none;
    margin-top:10px;
    font-weight:700;
    color:#fff;
}

.btn-copy:hover{
    opacity:0.9;
}

/* DETAILS */
.details-box{
    background-color:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
    display:none;
    margin-top:6px;
}

/* ROW */
.row{
    display:flex;
    justify-content:flex-start;
    align-items:flex-start;
    gap:5px;
    margin-bottom:2px;
    font-size:10px;
    border-bottom:1px solid #1f242c;
    padding-bottom:2px;
    line-height:1.3;
    cursor:pointer;
}
.row:hover {
    background-color: #1c2128;
}

/* KEY */
.key{
    color:var(--blue);
    font-weight:700;
    white-space:nowrap;
    min-width:115px;
}

/* VALUE */
.val{
    color:#fff;
    word-break:break-word;
}

/* UA OUTPUT */
.ua-output{
    background-color:#090c10;
    border:1px dotted var(--blue);
    padding:8px;
    border-radius:6px;
    margin-top:10px;
    word-break:break-all;
    font-family:monospace;
    font-size:10px;
    line-height:1.35;
    overflow-wrap:anywhere;
}

.ua-mobile-color {
    color: var(--blue);
}

.ua-windows-color {
    color: var(--purple);
}

/* MOBILE RESPONSIVE */
@media(max-width:800px){
    .wrapper{
        grid-template-columns:1fr;
    }
}

@media(max-width:480px){
    body{
        padding:6px;
    }

    .container{
        padding:10px;
    }

    .header{
        font-size:12px;
    }

    select,
    button{
        font-size:11px;
        padding:7px 8px;
    }
}
</style>
</head>

// ================= INITIALIZE DROPDOWNS =================
const dSelect = document.getElementById('deviceSelect');
devices.forEach((d, i) => {
    dSelect.innerHTML += `<option value="${i}">${d.brand} ${d.model}</option>`;
});

const winSelect = document.getElementById('windowsSelect');
windowsDevices.forEach((d, i) => {
    winSelect.innerHTML += `<option value="${i}">[${d.os}] ${d.brand} ${d.model}</option>`;
});

// ================= MOBILE LOGIC FUNCTIONS =================
function generateUA(){
    const d = devices[dSelect.value];
    const b = document.getElementById('browserSelect').value;
    const ver = browserVers[b][Math.floor(Math.random()*browserVers[b].length)];
    let ua = "";

    if(d.brand === "Apple"){
        let rawOS = d.os.match(/\d+/g);
        let iosMainVersion = rawOS ? rawOS[rawOS.length - 1] : "18";
        let iosFormatted = `${iosMainVersion}_4`;
        let webkitVer = "605.1.15";

        if(b === "Safari"){
            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosFormatted} like Mac OS X) AppleWebKit/${webkitVer} (KHTML, like Gecko) Version/${iosMainVersion}.4 Mobile/15E148 Safari/${webkitVer}`;
        }
        else if(b === "Chrome"){
            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosFormatted} like Mac OS X) AppleWebKit/${webkitVer} (KHTML, like Gecko) CriOS/${ver} Mobile/15E148 Safari/${webkitVer}`;
        }
        else if(b === "Edge"){
            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosFormatted} like Mac OS X) AppleWebKit/${webkitVer} (KHTML, like Gecko) EdgiOS/${ver} Mobile/15E148 Safari/${webkitVer}`;
        }
        else{
            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosFormatted} like Mac OS X) AppleWebKit/${webkitVer} (KHTML, like Gecko) FxiOS/${ver} Mobile/15E148 Safari/${webkitVer}`;
        }
    }
    else{
        let rawAnd = d.os.match(/\d+/);
        let andVer = rawAnd ? rawAnd[0] : "15";

        if(b === "Firefox"){
            ua = `Mozilla/5.0 (Android ${andVer}; Mobile; rv:${ver}) Gecko/${ver} Firefox/${ver}`;
        }
        else if(b === "Edge"){
            ua = `Mozilla/5.0 (Linux; Android ${andVer}; ${d.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${ver.split('.')[0]}.0.0.0 Mobile Safari/537.36 EdgA/${ver}`;
        }
        else if(b === "Safari"){
            ua = `Mozilla/5.0 (Linux; Android ${andVer}; ${d.model}) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Mobile Safari/537.36`;
        }
        else {
            ua = `Mozilla/5.0 (Linux; Android ${andVer}; ${d.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${ver} Mobile Safari/537.36`;
        }
    }

    let finalVendor = d.webgl_vendor;
    let finalRenderer = d.webgl_renderer;

    if (d.brand !== "Apple") {
        if (b === "Firefox") {
            finalVendor = d.webgl_vendor.replace("Google Inc. ", "");
        } else if (b === "Chrome" || b === "Edge") {
            let match = d.webgl_vendor.match(/\(([^)]+)\)/);
            if (match && match[1]) {
                finalVendor = "Google Inc. (" + match[1] + ")";
            } else {
                finalVendor = d.webgl_vendor; 
            }
        }
    }

    const infoFields = [
        ["Model:", d.brand + " " + d.model],
        ["CPU: 🚀", d.cpu],
        ["RAM: 🚀", d.ram],
        ["Resolution: 🚀", d.resolution],
        ["OS: 🚀", d.os],
        ["Browser: 🚀", b.toLowerCase() + " " + ver],
        ["WebGL Vendor: 🚀", finalVendor],
        ["Renderer: 🚀", finalRenderer],
    ];

    let html = "";
    infoFields.forEach(f => {
        html += `<div class="row" onclick="copyRow(this)" title="Click to copy value"><span class="key">${f[0]}</span><span class="val">${f[1]}</span></div>`;
    });

    document.getElementById('infoRows').innerHTML = html;
    document.getElementById('uaOutput').innerText = ua;
    document.getElementById('detailsArea').style.display = 'block';
}

function copyUA(){
    const uaText = document.getElementById('uaOutput').innerText;
    navigator.clipboard.writeText(uaText).then(() => {
        const copyBtn = document.getElementById('copyBtn');
        copyBtn.innerText = "✓ Copied!";
        copyBtn.style.backgroundColor = "#17a2b8";
        setTimeout(() => {
            copyBtn.innerText = "Copy User Agent";
            copyBtn.style.backgroundColor = "var(--green)";
        }, 1500);
    });
}

// ================= WINDOWS LOGIC FUNCTIONS =================
function getWinRandomVersion(browser) {
    const list = winBrowserVersions[browser];
    return list[Math.floor(Math.random() * list.length)];
}

function generateWindowsUA(){
    const d = windowsDevices[winSelect.value];
    const b = document.getElementById('winBrowserSelect').value;
    const ver = getWinRandomVersion(b);
    const majorVer = ver.split('.')[0];
    
    let ua = "";
    const ntVersion = "10.0"; 
    const arch = "Win64; x64";
    let clientHintUA = "";

    if(b === "Chrome"){
        ua = `Mozilla/5.0 (Windows NT ${ntVersion}; ${arch}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${ver} Safari/537.36`;
        clientHintUA = `"Not(A:Brand";v="99", "Google Chrome";v="${majorVer}", "Chromium";v="${majorVer}"`;
    }
    else if(b === "Edge"){
        ua = `Mozilla/5.0 (Windows NT ${ntVersion}; ${arch}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${majorVer}.0.0.0 Safari/537.36 Edg/${ver}`;
        clientHintUA = `"Not(A:Brand";v="99", "Microsoft Edge";v="${majorVer}", "Chromium";v="${majorVer}"`;
    }
    else if(b === "Firefox"){
        ua = `Mozilla/5.0 (Windows NT ${ntVersion}; ${arch}; rv:${ver}) Gecko/20100101 Firefox/${ver}`;
        clientHintUA = "Not Applicable (Firefox relies on navigator.userAgent)";
    }

    const infoFields = [
        ["Operating System:", d.os],
        ["Processor (CPU):", d.cpu],
        ["System Memory:", d.ram],
        ["Native Resolution:", d.resolution],
        ["Target Browser Build:", b + " " + ver],
        ["WebGL Vendor:", d.vendor],
        ["WebGL Renderer:", d.renderer],
    ];

    let html = "";
    infoFields.forEach(f => {
        html += `<div class="row" onclick="copyRow(this)" title="Click to copy value"><span class="key">${f[0]}</span><span class="val">${f[1]}</span></div>`;
    });

    document.getElementById('winInfoRows').innerHTML = html;
    document.getElementById('winUaOutput').innerText = ua;
    document.getElementById('winDetailsArea').style.display = 'block';
}

function copyWindowsUA(){
    const uaText = document.getElementById('winUaOutput').innerText;
    if(!uaText) return;
    
    navigator.clipboard.writeText(uaText).then(() => {
        const copyBtn = document.getElementById('winCopyBtn');
        copyBtn.innerText = "✓ Copied!";
        copyBtn.style.backgroundColor = "#17a2b8";
        setTimeout(() => {
            copyBtn.innerText = "Copy User Agent";
            copyBtn.style.backgroundColor = "var(--green)";
        }, 1500);
    });
}

// ================= GLOBAL UTILITY FUNCTIONS =================
function copyRow(el){
    const val = el.querySelector('.val').innerText;
    navigator.clipboard.writeText(val).then(() => {
        const originalBg = el.style.backgroundColor;
        el.style.backgroundColor = "#1f2a37";
        setTimeout(() => {
            el.style.backgroundColor = originalBg;
        }, 300);
    });
}
