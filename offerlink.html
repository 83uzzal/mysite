<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 6px; background: #007bff; color: white; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .delete-btn { background: #dc3545; }
        .delete-btn:hover { background: #a71d2a; }
        .copy-btn { background: #28a745; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔗 অফার লিঙ্ক ড্যাশবোর্ড</h2>
    <div class="input-group">
        <input type="text" id="newLink" placeholder="এখানে নতুন লিঙ্ক পেস্ট করুন...">
        <button onclick="save()">সেভ করুন</button>
    </div>
    <div id="list">লোড হচ্ছে...</div>
</div>

<script>
    function save() {
        var input = document.getElementById('newLink');
        if(!input.value) return;
        google.script.run.withSuccessHandler(load).addLink(input.value);
        input.value = "";
    }

    function load() {
        document.getElementById('list').innerHTML = "লোডিং...";
        google.script.run.withSuccessHandler(function(data) {
            var html = "";
            data.forEach((row, i) => {
                if(row[0] !== "") {
                    html += `<div class="item">
                        <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px;">${row[0]}</span>
                        <div>
                            <button class="copy-btn" onclick="copyLink('${row[0]}')">Copy</button>
                            <button class="delete-btn" onclick="del(${i})">Delete</button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('list').innerHTML = html || "কোন লিঙ্ক নেই।";
        }).getLinks();
    }

    function copyLink(text) {
        navigator.clipboard.writeText(text);
        alert("লিঙ্ক কপি হয়েছে!");
    }

    function del(i) {
        if(confirm("আপনি কি নিশ্চিত এই লিঙ্কটি মুছতে চান?")) {
            google.script.run.withSuccessHandler(load).deleteLink(i);
        }
    }

    load(); // পেজ লোড হলেই লিঙ্কগুলো দেখাবে
</script>

</body>
</html>
