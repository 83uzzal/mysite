<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exclusive Offers</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, var(--bg), #1e293b); color: #fff; min-height: 100vh; padding-bottom: 30px; }
        
        .header { text-align: center; padding: 30px 15px; }
        .header h1 { font-size: 1.5rem; margin-bottom: 5px; background: linear-gradient(to right, #818cf8, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 0 10px; }
        
        .tabs-container { display: flex; gap: 5px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 70px; padding: 10px 5px; cursor: pointer; text-align: center; border-radius: 8px; font-size: 0.75rem; font-weight: 600; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); }
        
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        
        .offer-card { background: var(--card); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: white; }
        
        .icon-box { width: 35px; height: 35px; background: rgba(99, 102, 241, 0.2); color: #818cf8; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
        
        .btn-claim { background: var(--accent); padding: 8px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; box-shadow: 0 4px 10px rgba(244, 63, 94, 0.3); animation: pulse 2s infinite; flex-shrink: 0; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(244, 63, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); } }
    </style>
</head>
<body>

<div class="header">
    <h1>🔥 Trending Rewards</h1>
    <p style="font-size: 0.85rem; opacity: 0.7;">Select your prize below</p>
</div>

<div class="container">
    <div class="tabs-container">
        <div class="tab-btn active" onclick="switchTab(event, 'panel1')">P-1</div>
        <div class="tab-btn" onclick="switchTab(event, 'panel2')">P-2</div>
        <div class="tab-btn" onclick="switchTab(event, 'panel3')">P-3</div>
        <div class="tab-btn" onclick="switchTab(event, 'bigPanel')">Big</div>
    </div>

    <div id="panel1" class="tab-content active"></div>
    <div id="panel2" class="tab-content"></div>
    <div id="panel3" class="tab-content"></div>
    <div id="bigPanel" class="tab-content"></div>
</div>

<script>
    // আপনার ডেটা এখানে আগের মতোই থাকবে...
    const data = {
        panel1: [["Consumer Test Connect - Aldi $100", "https://app.hawktrk.com/click?pid=2&offer_id=21419&sub2=u653891&sub5=Tat_mamunMR-Hasan"], ["CTConnect - Visa $750", "https://app.hawktrk.com/click?pid=2&offer_id=21345&sub2=u653891&sub5=Tat_mamunMR-Hasan"]],
        panel2: [["CTConnect - Visa $750", "https://app.hawktrk.com/click?pid=2&offer_id=21345&sub2=u578522&sub5=Tat_mamunMR-Hasan"]],
        panel3: [["CTConnect - Taco Bell", "https://app.hawktrk.com/click?pid=2&offer_id=91&sub2=u794924&sub5=Tat_mamunMR-Hasan"]],
        bigPanel: [["CTConnect - Visa $750", "https://app.hawktrk.com/click?pid=2&offer_id=21345&sub2=u628012&sub5=Tat_mamunMR-Hasan"]]
    };

    function render() {
        for (let p in data) {
            const element = document.getElementById(p);
            if(element) {
                element.innerHTML = data[p].map(o => `
                    <a href="${o[1]}" class="offer-card">
                        <div style="display:flex; align-items:center; overflow:hidden;">
                            <div class="icon-box"><i class="fas fa-gift"></i></div>
                            <div style="overflow:hidden;">
                                <div style="font-size:0.85rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${o[0]}</div>
                                <div style="font-size:0.65rem; opacity:0.6;">Limited Time Offer</div>
                            </div>
                        </div>
                        <div class="btn-claim">CLAIM</div>
                    </a>`).join('');
            }
        }
    }
    
    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }
    
    render();
</script>
</body>
</html>
